<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ability</title>
<script src="topbar.js" defer></script>
<script>
(function () {
  // This page has its own top navigation (the category tab row, matching
  // dashboard.html), so the shared bottom tab bar from topbar.js is
  // redundant here. DOMContentLoaded always fires after every deferred
  // script has run, so waiting for it guarantees the element exists
  // before we remove it.
  document.addEventListener('DOMContentLoaded', function () {
    var bottombar = document.getElementById('bottombar');
    if (bottombar) bottombar.remove();
    document.body.classList.remove('has-bottombar');
  });
})();
</script>
<style>
:root {
  --bg: #0A0A0B;
  --bg-deep: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --bg-secondary: rgba(255, 255, 255, 0.035);
  --glass-bg: rgba(255, 255, 255, 0.04);
  --glass-border: transparent;
  --glass-border-strong: transparent;
  --glass-shadow:
    0 1px 0 0 rgba(255, 255, 255, 0.06) inset,
    0 12px 40px rgba(0, 0, 0, 0.45),
    0 1px 2px rgba(0, 0, 0, 0.25);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;
  --border: transparent;
  --border-soft: transparent;
  --accent: #E07658;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

body::before {
  content: '';
  position: fixed;
  inset: -10%;
  z-index: -2;
  background:
    radial-gradient(60% 45% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 55%),
    radial-gradient(55% 45% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 55%),
    linear-gradient(180deg, #0A0A0B 0%, #050506 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.7;
  pointer-events: none;
}

.shell {
  max-width: 880px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ===== Category tabs (matches dashboard.html's top nav) ===== */
.cat-tabs {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 32px;
  margin: 4px 0 22px;
}
.cat-tab {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px;
  padding: 2px;
  border: 0;
  background: transparent;
  color: var(--text-tertiary);
  font-family: inherit;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
}
.cat-tab:hover { color: var(--text-secondary); }
.cat-tab.is-active { color: var(--text-primary); }
.cat-tab-icon { width: 22px; height: 22px; }
.cat-tab-icon svg { width: 100%; height: 100%; display: block; }
.cat-tab-label {
  font-size: 11px; font-weight: 600;
  line-height: 1.25;
  text-align: center;
  white-space: nowrap;
}
@media (max-width: 480px) {
  .cat-tabs { gap: 18px; }
  .cat-tab-label { font-size: 10px; }
}

/* Hide scrollbars everywhere */
html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }

/* Section title */
.section { margin-bottom: 18px; scroll-margin-top: 18px; }
.section-title {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title::before {
  content: '';
  width: 18px;
  height: 1px;
  background: var(--text-tertiary);
  opacity: 0.6;
}
.section-title-text { display: inline-flex; align-items: center; gap: 8px; }
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
}

/* Card */
.card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  margin-bottom: 10px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: var(--glass-shadow);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 14px; right: 14px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
  pointer-events: none;
}

/* Empty state */
.empty-state {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  text-align: center;
  padding: 16px 0;
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.empty-state::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-quaternary);
  flex-shrink: 0;
}

/* ============================================================
   Shared add-row / input styling
   ============================================================ */
.hab-add-row, .skill-add-row {
  display: flex; gap: 6px; align-items: stretch;
  padding: 4px;
  background: rgba(0, 0, 0, 0.30);
  border-radius: 12px;
  margin-bottom: 14px;
}
.hab-input, .skill-input {
  flex: 1; min-width: 0;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  padding: 9px 12px;
  font-family: inherit;
  font-size: 14px;
  -moz-appearance: textfield;
}
.hab-input::-webkit-outer-spin-button, .hab-input::-webkit-inner-spin-button,
.skill-input::-webkit-outer-spin-button, .skill-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.hab-input::placeholder, .skill-input::placeholder { color: var(--text-tertiary); }
.hab-add-btn, .skill-add-btn {
  padding: 0 16px;
  background: rgba(255,255,255,0.06);
  border: none;
  color: var(--text-secondary);
  border-radius: 9px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.hab-add-btn:hover, .skill-add-btn:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }
.hab-add-btn:active, .skill-add-btn:active { transform: scale(0.97); }

/* ============================================================
   HABIT TRACKER
   ============================================================ */
.hab-row {
  padding: 12px 14px;
  background: rgba(255,255,255,0.025);
  border-radius: 12px;
  margin-bottom: 8px;
}
.hab-row:hover { background: rgba(255,255,255,0.04); }
.hab-row-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.hab-name {
  flex: 1; min-width: 0;
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.hab-streak {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  color: var(--text-tertiary); white-space: nowrap;
}
.hab-streak.is-active { color: #F2A65A; }
.hab-del {
  background: transparent; border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-tertiary);
  cursor: pointer; font-size: 13px;
  padding: 4px 8px; border-radius: 6px;
  font-family: inherit; line-height: 1; flex-shrink: 0;
}
.hab-del:hover { color: var(--danger); }
.hab-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.hab-day {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  cursor: pointer; padding: 0;
  transition: background 0.15s, border-color 0.15s;
}
.hab-day:hover { border-color: rgba(255,255,255,0.30); }
.hab-day.is-done { background: var(--accent); border-color: var(--accent); }
.hab-day.is-today { box-shadow: 0 0 0 2px rgba(255,255,255,0.35); }

/* ============================================================
   SKILL TRACKER
   ============================================================ */
.skill-row {
  padding: 12px 14px;
  background: rgba(255,255,255,0.025);
  border-radius: 12px;
  margin-bottom: 8px;
}
.skill-row:hover { background: rgba(255,255,255,0.04); }
.skill-row-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.skill-name {
  flex: 1; min-width: 90px;
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.skill-total {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary);
  white-space: nowrap;
}
.skill-log-btn {
  padding: 6px 12px; border-radius: 8px;
  border: 1px dashed rgba(255,255,255,0.16);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit; font-size: 11px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.skill-log-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.3); }
.skill-del {
  background: transparent; border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-tertiary);
  cursor: pointer; font-size: 13px;
  padding: 4px 8px; border-radius: 6px;
  font-family: inherit; line-height: 1; flex-shrink: 0;
}
.skill-del:hover { color: var(--danger); }

.skill-progress-row { display: flex; justify-content: flex-end; margin-bottom: 4px; }
.skill-progress-value {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--text-primary);
}
.skill-slider {
  width: 100%; display: block;
  accent-color: var(--accent);
  cursor: pointer;
  margin-bottom: 10px;
}

.skill-log-form {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: stretch;
  padding: 4px;
  background: rgba(0, 0, 0, 0.30);
  border-radius: 10px;
  margin-bottom: 10px;
}
.skill-log-form .skill-input { flex: 1; min-width: 90px; }
.skill-log-form .skill-log-minutes { flex: 0 1 90px; }
.skill-log-form .skill-log-notes { flex: 2; min-width: 120px; }
.skill-log-cancel {
  padding: 0 14px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.10);
  color: var(--text-secondary);
  border-radius: 9px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.skill-log-cancel:hover { color: var(--text-primary); }

.skill-history {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 150px; overflow-y: auto;
}
.skill-history-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 9px;
  background: rgba(255,255,255,0.02);
  border-radius: 8px;
  font-size: 11.5px; color: var(--text-secondary);
}
.skill-history-date {
  font-family: var(--font-mono); color: var(--text-tertiary); white-space: nowrap;
}
.skill-history-dur {
  font-family: var(--font-mono); font-weight: 700; color: var(--text-primary); white-space: nowrap;
}
.skill-history-notes {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--text-tertiary);
}
.skill-history-del {
  background: transparent; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 13px; padding: 0 4px; flex-shrink: 0;
}
.skill-history-del:hover { color: var(--danger); }
.skill-history-empty {
  font-size: 11px; color: var(--text-tertiary); font-style: italic; padding: 4px 2px;
}

@media (max-width: 480px) {
  .hab-day { width: 13px; height: 13px; }
}
</style>
</head>

<script>
(function () {
  'use strict';

  // ---------- storage helpers (same interface as dashboard.html) ----------
  function storeGet(key) {
    try { const raw = localStorage.getItem(key); return raw == null ? null : JSON.parse(raw); }
    catch (e) { return null; }
  }
  function storeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  }

  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }

  // ============================================================
  // HABIT TRACKER
  // ============================================================
  const HABITS_KEY = 'habits_v1';
  const HAB_GRID_DAYS = 30;
  function getHabits() { const v = storeGet(HABITS_KEY); return Array.isArray(v) ? v : []; }
  function setHabits(list) { storeSet(HABITS_KEY, list); }

  function computeStreak(history) {
    let streak = 0;
    let cursor = new Date();
    if (!history[dateKey(cursor)]) cursor = addDays(cursor, -1);
    while (history[dateKey(cursor)]) {
      streak++;
      cursor = addDays(cursor, -1);
    }
    return streak;
  }

  function buildHabitRow(habit) {
    const row = document.createElement('div');
    row.className = 'hab-row';
    row.dataset.id = habit.id;
    const history = habit.history || {};
    const streak = computeStreak(history);

    const top = document.createElement('div');
    top.className = 'hab-row-top';
    top.innerHTML =
      '<span class="hab-name"></span>' +
      '<span class="hab-streak' + (streak > 0 ? ' is-active' : '') + '">🔥 ' + streak + '</span>' +
      '<button type="button" class="hab-del" aria-label="Delete habit">×</button>';
    top.querySelector('.hab-name').textContent = habit.name;
    top.querySelector('.hab-del').addEventListener('click', () => {
      setHabits(getHabits().filter(h => h.id !== habit.id));
      renderHabits();
    });
    row.appendChild(top);

    const grid = document.createElement('div');
    grid.className = 'hab-grid';
    const today = new Date();
    for (let i = HAB_GRID_DAYS - 1; i >= 0; i--) {
      const d = addDays(today, -i);
      const key = dateKey(d);
      const isToday = i === 0;
      const isDone = !!history[key];
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'hab-day' + (isDone ? ' is-done' : '') + (isToday ? ' is-today' : '');
      btn.title = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + (isToday ? ' (today)' : '');
      btn.addEventListener('click', () => {
        const list = getHabits();
        const idx = list.findIndex(h => h.id === habit.id);
        if (idx === -1) return;
        const hist = Object.assign({}, list[idx].history || {});
        if (hist[key]) delete hist[key]; else hist[key] = true;
        list[idx] = Object.assign({}, list[idx], { history: hist });
        setHabits(list);
        renderHabits();
      });
      grid.appendChild(btn);
    }
    row.appendChild(grid);
    return row;
  }

  function renderHabits() {
    const wrap = document.getElementById('habList');
    const emptyState = document.getElementById('habEmptyState');
    if (!wrap) return;
    const list = getHabits();
    wrap.innerHTML = '';
    emptyState.style.display = list.length ? 'none' : '';
    list.forEach(h => wrap.appendChild(buildHabitRow(h)));
  }

  function initHabitAddForm() {
    document.getElementById('habAddBtn').addEventListener('click', () => {
      const input = document.getElementById('habNameInput');
      const name = input.value.trim();
      if (!name) return;
      const list = getHabits();
      list.push({ id: 'hb' + Date.now() + Math.random().toString(36).slice(2, 7), name, history: {} });
      setHabits(list);
      input.value = '';
      renderHabits();
    });
  }

  // ============================================================
  // SKILL TRACKER
  // ============================================================
  const SKILLS_KEY = 'skills_v1';
  let skillLoggingId = null;

  function getSkills() { const v = storeGet(SKILLS_KEY); return Array.isArray(v) ? v : []; }
  function setSkills(list) { storeSet(SKILLS_KEY, list); }

  function totalMinutes(skill) {
    return (skill.sessions || []).reduce((sum, s) => sum + (s.minutes || 0), 0);
  }
  function formatMinutes(total) {
    if (!total) return '0m logged';
    const h = Math.floor(total / 60);
    const m = total % 60;
    if (h && m) return h + 'h ' + m + 'm logged';
    if (h) return h + 'h logged';
    return m + 'm logged';
  }

  function buildSkillHistory(skill) {
    const wrap = document.createElement('div');
    wrap.className = 'skill-history';
    const sessions = (skill.sessions || []).slice().sort((a, b) => new Date(b.loggedAt) - new Date(a.loggedAt));
    if (!sessions.length) {
      const empty = document.createElement('div');
      empty.className = 'skill-history-empty';
      empty.textContent = 'No sessions logged yet.';
      wrap.appendChild(empty);
      return wrap;
    }
    sessions.forEach(s => {
      const row = document.createElement('div');
      row.className = 'skill-history-row';
      const d = new Date(s.loggedAt);
      row.innerHTML =
        '<span class="skill-history-date"></span>' +
        '<span class="skill-history-dur"></span>' +
        '<span class="skill-history-notes"></span>' +
        '<button type="button" class="skill-history-del" aria-label="Delete session">×</button>';
      row.querySelector('.skill-history-date').textContent = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      row.querySelector('.skill-history-dur').textContent = (s.minutes || 0) + 'm';
      row.querySelector('.skill-history-notes').textContent = s.notes || '';
      row.querySelector('.skill-history-del').addEventListener('click', () => {
        const list = getSkills();
        const idx = list.findIndex(x => x.id === skill.id);
        if (idx === -1) return;
        list[idx] = Object.assign({}, list[idx], { sessions: (list[idx].sessions || []).filter(x => x.id !== s.id) });
        setSkills(list);
        renderSkills();
      });
      wrap.appendChild(row);
    });
    return wrap;
  }

  function buildSkillRow(skill) {
    const row = document.createElement('div');
    row.className = 'skill-row';
    row.dataset.id = skill.id;

    const top = document.createElement('div');
    top.className = 'skill-row-top';
    top.innerHTML =
      '<span class="skill-name"></span>' +
      '<span class="skill-total"></span>' +
      '<button type="button" class="skill-log-btn">+ Log session</button>' +
      '<button type="button" class="skill-del" aria-label="Delete skill">×</button>';
    top.querySelector('.skill-name').textContent = skill.name;
    top.querySelector('.skill-total').textContent = formatMinutes(totalMinutes(skill));
    top.querySelector('.skill-del').addEventListener('click', () => {
      setSkills(getSkills().filter(x => x.id !== skill.id));
      renderSkills();
    });
    top.querySelector('.skill-log-btn').addEventListener('click', () => {
      skillLoggingId = (skillLoggingId === skill.id) ? null : skill.id;
      renderSkills();
    });
    row.appendChild(top);

    const progressRow = document.createElement('div');
    progressRow.className = 'skill-progress-row';
    progressRow.innerHTML = '<span class="skill-progress-value">' + (skill.progress || 0) + '%</span>';
    row.appendChild(progressRow);

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = '0';
    slider.max = '100';
    slider.className = 'skill-slider';
    slider.value = String(skill.progress || 0);
    const valueLabel = progressRow.querySelector('.skill-progress-value');
    slider.addEventListener('input', () => { valueLabel.textContent = slider.value + '%'; });
    slider.addEventListener('change', () => {
      const list = getSkills();
      const idx = list.findIndex(x => x.id === skill.id);
      if (idx !== -1) {
        list[idx] = Object.assign({}, list[idx], { progress: Number(slider.value) });
        setSkills(list);
      }
    });
    row.appendChild(slider);

    if (skillLoggingId === skill.id) {
      const form = document.createElement('div');
      form.className = 'skill-log-form';
      form.innerHTML =
        '<input type="number" class="skill-input skill-log-minutes" placeholder="Minutes" min="1">' +
        '<input type="text" class="skill-input skill-log-notes" placeholder="Notes (optional)…">' +
        '<button type="button" class="skill-add-btn skill-log-save">Save</button>' +
        '<button type="button" class="skill-log-cancel">Cancel</button>';
      form.querySelector('.skill-log-save').addEventListener('click', () => {
        const minutes = Number(form.querySelector('.skill-log-minutes').value) || 0;
        if (!minutes) return;
        const notes = form.querySelector('.skill-log-notes').value.trim();
        const list = getSkills();
        const idx = list.findIndex(x => x.id === skill.id);
        if (idx !== -1) {
          const sessions = (list[idx].sessions || []).concat([{
            id: 'ss' + Date.now() + Math.random().toString(36).slice(2, 7),
            minutes, notes, loggedAt: new Date().toISOString()
          }]);
          list[idx] = Object.assign({}, list[idx], { sessions });
          setSkills(list);
        }
        skillLoggingId = null;
        renderSkills();
      });
      form.querySelector('.skill-log-cancel').addEventListener('click', () => {
        skillLoggingId = null;
        renderSkills();
      });
      row.appendChild(form);
    }

    row.appendChild(buildSkillHistory(skill));
    return row;
  }

  function renderSkills() {
    const wrap = document.getElementById('skillList');
    const emptyState = document.getElementById('skillEmptyState');
    if (!wrap) return;
    const list = getSkills();
    wrap.innerHTML = '';
    emptyState.style.display = list.length ? 'none' : '';
    list.forEach(s => wrap.appendChild(buildSkillRow(s)));
  }

  function initSkillAddForm() {
    document.getElementById('skillAddBtn').addEventListener('click', () => {
      const input = document.getElementById('skillNameInput');
      const name = input.value.trim();
      if (!name) return;
      const list = getSkills();
      list.push({ id: 'sk' + Date.now() + Math.random().toString(36).slice(2, 7), name, progress: 0, sessions: [] });
      setSkills(list);
      input.value = '';
      renderSkills();
    });
  }

  // ---------- Boot ----------
  renderHabits();
  initHabitAddForm();
  renderSkills();
  initSkillAddForm();

  // Re-render if storage changes from another tab.
  window.addEventListener('storage', () => { renderHabits(); renderSkills(); });
})();
</script>

</body>
</html>
