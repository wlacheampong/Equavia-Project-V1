<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<link rel="icon" type="image/webp" href="images/Index Landing Page.webp">
<title>William's Dashboard</title>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-tertiary: #76746E;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #050506;
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

/* Same ambient backdrop as the dashboard, so the landing page reads as
   part of the same app rather than a separate splash screen. */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -1;
}

.landing {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: max(28px, env(safe-area-inset-top)) 20px max(28px, env(safe-area-inset-bottom));
  opacity: 0;
  animation: landing-fade-in 0.9s ease-out forwards;
}

@keyframes landing-fade-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.hero-link {
  display: block;
  max-width: min(90vw, 640px);
  max-height: min(80vh, 640px);
  line-height: 0;
  border-radius: 20px;
  outline-offset: 6px;
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), filter 0.35s ease;
  -webkit-tap-highlight-color: transparent;
}
.hero-link:hover,
.hero-link:focus-visible {
  transform: scale(1.035);
  filter: drop-shadow(0 0 34px rgba(255, 70, 70, 0.35));
}
.hero-link:active { transform: scale(0.985); }
.hero-link:focus-visible { outline: 2px solid rgba(255, 255, 255, 0.55); }

.hero-image {
  display: block;
  width: 100%;
  height: 100%;
  max-width: min(90vw, 640px);
  max-height: min(80vh, 640px);
  object-fit: contain;
}

@media (prefers-reduced-motion: reduce) {
  .landing { animation: none; opacity: 1; }
  .hero-link { transition: none; }
}
</style>
</head>
<body>

<div class="landing">
  <a href="dashboard.html" class="hero-link" aria-label="Enter dashboard">
    <img
      src="images/Index Landing Page.webp"
      alt="Enter dashboard"
      class="hero-image"
      width="1280"
      height="800"
    >
  </a>
</div>

</body>
</html>
