<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<link rel="icon" type="image/webp" href="images/Index Landing Page.webp">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Equavia">
<title>Equavia</title>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-tertiary: #76746E;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #050506;
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

/* Same ambient backdrop as the dashboard, so the landing page reads as
   part of the same app rather than a separate splash screen. */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -1;
}

.landing {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 100dvh;
  display: flex;
  align-items: stretch;
  justify-content: stretch;
  opacity: 0;
  animation: landing-fade-in 0.9s ease-out forwards;
}

@keyframes landing-fade-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.hero-link {
  display: block;
  width: 100%;
  height: 100%;
  line-height: 0;
  outline-offset: -6px;
  -webkit-tap-highlight-color: transparent;
}
.hero-link:focus-visible { outline: 2px solid rgba(255, 255, 255, 0.55); }

.hero-image {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

@media (prefers-reduced-motion: reduce) {
  .landing { animation: none; opacity: 1; }
  .hero-link { transition: none; }
}
</style>
</head>
<body>

<div class="landing">
  <a href="dashboard.html" class="hero-link" aria-label="Enter dashboard">
    <img
      src="images/splash-red-wing.jpg"
      alt="Enter dashboard"
      class="hero-image"
      width="1920"
      height="1200"
    >
  </a>
</div>

</body>
</html>
