<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<script src="landing-guard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="vitality-bridge.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#050506">
<link rel="icon" type="image/webp" href="images/Index Landing Page.webp">
<link rel="apple-touch-icon" href="images/Index Landing Page.webp">
<title>Peak</title>
<script src="topbar.js" defer></script>
<style>
  /* Vitality reskin of the Patron "Peak" energy-curve tile — sealed & bridge-backed.
     Captures the core function: a circadian energy peak predicted from your wake/bed
     rhythm, last night's sleep, and caffeine pharmacokinetics. No network, no
     browser storage, no external files — persists through the dashboard bridge. */
  :root{
    --bg:#050506;--surface:#0e0e11;--border:#1d1d22;--brand:#6EE7B7;
    --brand-soft:rgba(110,231,183,.08);--brand-line:rgba(110,231,183,.35);
    --muted:#84848c;--muted-strong:#a8a8b0;--fg:#ededf0;--neg:#ff6b6b;--neg-line:rgba(255,107,107,.4);
    --warn:#f5b169;--track:#17171b;--radius-md:12px;--radius-pill:999px;
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
    --duration:.2s;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 var(--font-display);display:flex;justify-content:center;padding:40px 20px}
  .shell{width:100%;max-width:620px}
  .header{margin-bottom:22px}
  .title{font-size:24px;font-weight:600;letter-spacing:-.01em;margin:0}
  .subtitle{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin:6px 0 0}
  .card{border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:18px;margin-top:14px}
  .card:first-of-type{margin-top:0}
  .cardName{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:14px}
  .nowRow{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .nowCell{display:flex;flex-direction:column;gap:2px}
  .nowCell .n{font-weight:600;font-size:40px;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;color:var(--brand)}
  .nowCell .n.dim{color:var(--fg)}
  .nowCell .l{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .nowCell.r{text-align:right}
  .nowCell.r .n{font-size:24px}
  .status{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-strong);margin:14px 0 4px}
  .chart{width:100%;height:auto;display:block;margin-top:6px}
  .chart .grid{stroke:var(--border);stroke-width:1}
  .chart .axl{fill:var(--muted);font-family:var(--font-mono);font-size:9px;letter-spacing:.08em}
  .chart .eline{fill:none;stroke:var(--brand);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
  .chart .bline{fill:none;stroke:var(--muted);stroke-width:1.25;stroke-dasharray:3 4;opacity:.55}
  .chart .nowl{stroke:var(--fg);stroke-width:1;opacity:.5;stroke-dasharray:2 3}
  .chart .nowd{fill:var(--fg)}
  .chart .peakd{fill:var(--brand);stroke:var(--bg);stroke-width:1.5}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
  .legend span{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
  .swatch{width:14px;height:0;border-top:2px solid var(--brand)}
  .swatch.base{border-top:2px dashed var(--muted)}
  .fields{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:480px){.fields{grid-template-columns:1fr 1fr}}
  .field{display:flex;flex-direction:column;gap:6px}
  .field .l{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .fieldInput{background:var(--bg);border:1px solid var(--border);color:var(--fg);border-radius:10px;padding:9px 11px;font:inherit;width:100%}
  .fieldInput:focus{outline:none;border-color:var(--brand)}
  .caffHead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .caffTotal{font-weight:600;font-size:22px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .caffTotal.over{color:var(--neg)}
  .coach{font-family:var(--font-mono);font-size:11px;letter-spacing:.02em;color:var(--muted-strong)}
  .coach.warn{color:var(--warn)}
  .presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .chip{border:1px solid var(--border);background:var(--bg);color:var(--fg);border-radius:var(--radius-pill);padding:8px 12px;font:inherit;font-size:13px;cursor:pointer}
  .chip:hover{border-color:var(--brand-line)}
  .chip .mg{color:var(--muted);font-family:var(--font-mono);font-size:10px;margin-left:5px}
  .customAdd{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .customAdd .fieldInput{width:92px}
  .btn-primary{background:var(--brand);color:#04140d;border:none;border-radius:10px;padding:9px 14px;font:inherit;font-weight:600;cursor:pointer}
  .logList{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .logRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg)}
  .logRow .nm{font-weight:600;font-size:14px}
  .logRow .meta{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
  .xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0}
  .xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
  .empty{color:var(--muted);font-size:13px;padding:10px 0}
  .hint{color:var(--neg);font-size:12px;font-family:var(--font-mono);min-height:14px;margin-top:6px}
</style>
</head>
<body>
<main><div class="shell" id="app"></div></main>
<script>
/* Peak — daily energy-curve predictor. Ported from the Patron "Peak" standalone:
   reskinned to Vitality mint, sealed (no external assets), persisting through the
   dashboard bridge (window.Vitality) instead of browser storage. The circadian shape,
   caffeine one-compartment model, and net-caffeine boost/rebound math are carried
   over faithfully from the source. */
let store={};
const $=id=>document.getElementById(id);

/* ---- persistence ---- */
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function persist(){window.Vitality.save(store);}
function today(){
  if(!store.log||typeof store.log!=='object')store.log={};
  let d=store.log[todayKey()];
  if(!d||typeof d!=='object'){d={slept:null,caff:[]};store.log[todayKey()]=d;}
  if(!Array.isArray(d.caff))d.caff=[];
  return d;
}
function wakeStr(){return store.wake||'07:00';}
function bedStr(){return store.bed||'23:00';}

/* ---- math (carried over from the source) ---- */
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
const KA=4.0,HALF_LIFE=5,KE=Math.LN2/HALF_LIFE;         // caffeine absorption + elimination rates
function doseAmount(mg,h){ if(h<0)return 0; if(Math.abs(KA-KE)<1e-9)return 0;
  const a=mg*KA/(KA-KE)*(Math.exp(-KE*h)-Math.exp(-KA*h)); return Math.max(0,a); }
function parseHM(s){ if(!s)return null; const m=String(s).match(/(\d{1,2}):(\d{2})/); if(!m)return null; return (+m[1])+(+m[2])/60; }
function wakeBed(){ let wake=parseHM(wakeStr()),bed=parseHM(bedStr()); if(wake==null)wake=7; if(bed==null)bed=23; return {wake,bed}; }
function nowT(){ const d=new Date(); return d.getHours()+d.getMinutes()/60; }
function clockOf(t){ t=((t%24)+24)%24; let hh=Math.floor(t); const mm=Math.round((t-hh)*60); let m2=mm; if(m2===60){hh+=1;m2=0;} const ap=hh<12?'AM':'PM'; let h12=hh%12; if(h12===0)h12=12; return h12+(m2?':'+String(m2).padStart(2,'0'):'')+' '+ap; }

/* caffeine in the body at time-of-day t (hours), summed over today's doses */
function bodyAt(t){ return today().caff.reduce((s,l)=>s+doseAmount(+l.mg||0,t-l.t),0); }
/* net caffeine effect: a boost while it's in your system, then a rebound DIP below
   baseline as it clears (adenosine rebound = the crash). */
function caffNet(t){
  const cur=bodyAt(t); let mx=cur;
  for(let dt=0.5;dt<=5;dt+=0.5){ const b=bodyAt(t-dt); if(b>mx)mx=b; }
  const boost=Math.min(22,cur*0.14);
  const rebound=Math.min(13,Math.max(0,mx-cur)*0.10);
  return boost-rebound;
}
/* sleep-recovery scales the whole day's energy ceiling */
function recScale(){ const s=today().slept; const r=(s==null)?0.78:clamp(s/8,0.3,1); return 0.58+0.42*r; }
/* circadian energy shape (0..1) across hours-awake — wake inertia, homeostatic
   decline, post-lunch dip, evening second wind, night-time taper. */
function shape(t,wake,bed){
  const L=(((bed-wake)%24)+24)%24 || 16;
  let aw=(((t-wake)%24)+24)%24;
  if(aw>L){ const into=aw-L, sleepLen=24-L||8, mid=sleepLen/2; return 0.12-0.07*(1-Math.abs(into-mid)/mid); }
  const inertia=0.55+0.45*(1-Math.exp(-aw/1.0));
  const decline=1-0.16*(aw/L);
  const winddown=1-0.40*clamp((aw-(L-1.5))/1.5,0,1);
  const dip=0.13*Math.exp(-Math.pow(aw-L*0.45,2)/(2*1.7*1.7));
  const eve=0.07*Math.exp(-Math.pow(aw-(L-4),2)/(2*2.0*2.0));
  return Math.max(0.04,0.92*inertia*decline*winddown-dip+eve);
}
function energyAt(t){ const {wake,bed}=wakeBed(); const base=clamp(shape(t,wake,bed)*100*recScale(),1,100); const caf=caffNet(t); return {base,caf,e:clamp(base+caf,1,100)}; }
function buildCurve(){ const a=[]; for(let t=0;t<=24;t+=0.25)a.push(Object.assign({t},energyAt(t))); return a; }
function peakOf(c){ const {wake,bed}=wakeBed(); let best=c[0];
  for(const p of c){ const inDay=bed>wake?(p.t>=wake&&p.t<=bed):(p.t>=wake||p.t<=bed); if(inDay&&p.e>best.e)best=p; }
  if(best.e<=2)for(const p of c)if(p.e>best.e)best=p; return best; }
function statusOf(e){ return e>=80?'Peak zone':e>=62?'Dialed in':e>=45?'Steady':e>=28?'Running low':'Depleted'; }

/* ---- caffeine coaching ---- */
const CAFF_CEIL=400;                                 // FDA-safe daily ceiling (mg)
const CLEAR_HRS=HALF_LIFE*1.6;                       // ~time to fall to a sleep-safe level
function caffTotal(){ return today().caff.reduce((s,l)=>s+(+l.mg||0),0); }
function caffCutoff(){ const {bed}=wakeBed(); return ((bed-CLEAR_HRS)%24+24)%24; }
function pastCutoff(){ const {bed}=wakeBed(); const hrsToBed=((bed-nowT())+24)%24; return hrsToBed>0&&hrsToBed<CLEAR_HRS; }
function coach(){
  const total=caffTotal();
  if(total>=CAFF_CEIL) return {warn:true,txt:'At your '+CAFF_CEIL+' mg ceiling — more now risks jitters + a rough crash.'};
  if(pastCutoff()) return {warn:true,txt:'Past cut-off ('+clockOf(caffCutoff())+') — caffeine now costs you deep sleep.'};
  return {warn:false,txt:'Cut-off '+clockOf(caffCutoff())+' · '+Math.round(CAFF_CEIL-total)+' mg left today'};
}

/* ---- chart geometry ---- */
const CW=560,CX0=10,CX1=550,CY0=14,CY1=130;
function xOf(t){ return CX0+(clamp(t,0,24)/24)*(CX1-CX0); }
function yOf(e){ return CY1-(clamp(e,0,100)/100)*(CY1-CY0); }

/* ---- render ---- */
function chartHtml(){
  const curve=buildCurve(), peak=peakOf(curve), now=nowT(), nowE=energyAt(now).e;
  const eline=curve.map((p,i)=>(i?'L':'M')+xOf(p.t).toFixed(1)+' '+yOf(p.e).toFixed(1)).join(' ');
  const bline=curve.map((p,i)=>(i?'L':'M')+xOf(p.t).toFixed(1)+' '+yOf(p.base).toFixed(1)).join(' ');
  const area=eline+' L '+xOf(24).toFixed(1)+' '+CY1+' L '+xOf(0).toFixed(1)+' '+CY1+' Z';
  const grid=[6,12,18].map(h=>'<line x1="'+xOf(h)+'" y1="'+CY0+'" x2="'+xOf(h)+'" y2="'+CY1+'" class="grid"/>').join('');
  const labels=[[3,'3a'],[9,'9a'],[15,'3p'],[21,'9p']].map(a=>'<text x="'+xOf(a[0])+'" y="'+(CY1+15)+'" class="axl" text-anchor="middle">'+a[1]+'</text>').join('');
  return '<svg viewBox="0 0 '+CW+' '+(CY1+22)+'" class="chart" role="img" aria-label="Predicted energy through the day">'
    +'<defs><linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0" stop-color="#6EE7B7" stop-opacity=".24"/><stop offset="1" stop-color="#6EE7B7" stop-opacity="0"/></linearGradient></defs>'
    +grid
    +'<path d="'+area+'" fill="url(#fill)"/>'
    +'<path d="'+bline+'" class="bline"/>'
    +'<path d="'+eline+'" class="eline"/>'
    +'<line x1="'+xOf(now).toFixed(1)+'" y1="'+CY0+'" x2="'+xOf(now).toFixed(1)+'" y2="'+CY1+'" class="nowl"/>'
    +'<circle cx="'+xOf(peak.t).toFixed(1)+'" cy="'+yOf(peak.e).toFixed(1)+'" r="4" class="peakd"/>'
    +'<circle cx="'+xOf(now).toFixed(1)+'" cy="'+yOf(nowE).toFixed(1)+'" r="3.5" class="nowd"/>'
    +labels+'</svg>';
}
function summaryHtml(){
  const curve=buildCurve(), peak=peakOf(curve), now=nowT(), nowE=Math.round(energyAt(now).e);
  const head='<div class="nowRow">'
    +'<div class="nowCell"><span class="n">'+nowE+'</span><span class="l">energy now</span></div>'
    +'<div class="nowCell r"><span class="n dim">'+Math.round(peak.e)+'</span><span class="l">peak · '+clockOf(peak.t)+'</span></div></div>';
  const status='<p class="status">'+clockOf(now)+' — '+statusOf(nowE)+'</p>';
  const legend='<div class="legend"><span><i class="swatch"></i>with caffeine</span><span><i class="swatch base"></i>baseline rhythm</span></div>';
  return '<section class="card"><span class="cardName">Today</span>'+head+status+chartHtml()+legend+'</section>';
}
function rhythmHtml(){
  const slept=today().slept;
  return '<section class="card"><span class="cardName">Rhythm</span><div class="fields">'
    +'<div class="field"><span class="l">wake</span><input class="fieldInput" id="wake" type="time" value="'+wakeStr()+'" /></div>'
    +'<div class="field"><span class="l">bed</span><input class="fieldInput" id="bed" type="time" value="'+bedStr()+'" /></div>'
    +'<div class="field"><span class="l">slept (h)</span><input class="fieldInput" id="slept" type="number" min="0" max="14" step="0.5" placeholder="7.5" value="'+(slept==null?'':slept)+'" /></div>'
    +'</div></section>';
}
const PRESETS=[['Espresso',63],['Coffee',95],['Tea',47],['Energy drink',160],['Pre-workout',200]];
function caffeineHtml(){
  const total=caffTotal(), c=coach();
  const chips=PRESETS.map((p,i)=>'<button class="chip" data-preset="'+i+'">'+p[0]+'<span class="mg">'+p[1]+'mg</span></button>').join('');
  const log=today().caff.slice().sort((a,b)=>a.t-b.t);
  const rows=log.length
    ? '<div class="logList">'+log.map(l=>'<div class="logRow"><div><div class="nm">'+Math.round(l.mg)+' mg <span class="meta">'+(l.label?l.label+' · ':'')+clockOf(l.t)+'</span></div></div><button class="xBtn" data-del="'+l.id+'" title="Remove">×</button></div>').join('')+'</div>'
    : '<p class="empty">No caffeine logged yet — add a dose to see the lift.</p>';
  return '<section class="card"><span class="cardName">Caffeine</span>'
    +'<div class="caffHead"><span class="caffTotal'+(total>=CAFF_CEIL?' over':'')+'">'+Math.round(total)+' mg</span><span class="coach'+(c.warn?' warn':'')+'">'+c.txt+'</span></div>'
    +'<div class="presets">'+chips+'</div>'
    +'<div class="customAdd"><input class="fieldInput" id="caffMg" type="number" min="1" step="5" placeholder="mg" /><button class="btn-primary" id="caffAdd">Add now</button></div>'
    +'<div class="hint" id="hint"></div>'
    +rows+'</section>';
}
function headerHtml(){ return '<header class="header"><h1 class="title">Peak</h1><p class="subtitle">energy · caffeine · circadian</p></header>'; }
function render(){ $('app').innerHTML=headerHtml()+summaryHtml()+rhythmHtml()+caffeineHtml(); }

/* ---- interactions ---- */
function addDose(mg,label){
  mg=Math.round(mg);
  today().caff.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,7),t:Math.round(nowT()*4)/4,mg,label:label||''});
  persist(); render();
}
document.addEventListener('change',e=>{
  if(e.target.id==='wake'){ store.wake=e.target.value||'07:00'; persist(); render(); }
  if(e.target.id==='bed'){ store.bed=e.target.value||'23:00'; persist(); render(); }
  if(e.target.id==='slept'){ const v=e.target.value.trim(); const n=Number(v); today().slept=(v===''||!isFinite(n))?null:clamp(n,0,14); persist(); render(); }
});
document.addEventListener('click',e=>{
  const preset=e.target.closest('[data-preset]');
  if(preset){ const p=PRESETS[Number(preset.getAttribute('data-preset'))]; if(p)addDose(p[1],p[0]); return; }
  if(e.target.id==='caffAdd'){
    const el=$('caffMg'), mg=Number(el&&el.value);
    if(!isFinite(mg)||mg<=0){ const h=$('hint'); if(h)h.textContent='Enter a caffeine amount in mg.'; return; }
    addDose(mg,'Custom'); return;
  }
  const del=e.target.closest('[data-del]');
  if(del){ const id=del.getAttribute('data-del'); const d=today(); d.caff=d.caff.filter(l=>String(l.id)!==id); persist(); render(); }
});

/* ---- boot: render only after the bridge resolves ---- */
(async()=>{ const d=await window.Vitality.load(); store=(d&&typeof d==='object'&&!Array.isArray(d))?d:{}; render(); })();
</script>
</body>
</html>
