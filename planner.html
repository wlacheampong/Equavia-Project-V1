<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Planner</title>
<script src="topbar.js" defer></script>
<script>
(function () {
  // This page has its own top navigation (the category tab row, matching
  // dashboard.html), so the shared bottom tab bar from topbar.js is
  // redundant here. DOMContentLoaded always fires after every deferred
  // script has run, so waiting for it guarantees the element exists
  // before we remove it.
  document.addEventListener('DOMContentLoaded', function () {
    var bottombar = document.getElementById('bottombar');
    if (bottombar) bottombar.remove();
    document.body.classList.remove('has-bottombar');
  });
})();
</script>
<style>
:root {
  --bg: #0A0A0B;
  --bg-deep: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --bg-secondary: rgba(255, 255, 255, 0.035);
  --glass-bg: rgba(255, 255, 255, 0.04);
  --glass-border: transparent;
  --glass-border-strong: transparent;
  --glass-shadow:
    0 1px 0 0 rgba(255, 255, 255, 0.06) inset,
    0 12px 40px rgba(0, 0, 0, 0.45),
    0 1px 2px rgba(0, 0, 0, 0.25);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;
  --border: transparent;
  --border-soft: transparent;
  --accent: #E07658;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

body::before {
  content: '';
  position: fixed;
  inset: -10%;
  z-index: -2;
  background:
    radial-gradient(60% 45% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 55%),
    radial-gradient(55% 45% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 55%),
    linear-gradient(180deg, #0A0A0B 0%, #050506 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.7;
  pointer-events: none;
}

.shell {
  max-width: 880px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ===== Category tabs (matches dashboard.html's top nav) ===== */
.cat-tabs {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 32px;
  margin: 4px 0 22px;
}
.cat-tab {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px;
  padding: 2px;
  border: 0;
  background: transparent;
  color: var(--text-tertiary);
  font-family: inherit;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
}
.cat-tab:hover { color: var(--text-secondary); }
.cat-tab.is-active { color: var(--text-primary); }
.cat-tab-icon { width: 22px; height: 22px; }
.cat-tab-icon svg { width: 100%; height: 100%; display: block; }
.cat-tab-label {
  font-size: 11px; font-weight: 600;
  line-height: 1.25;
  text-align: center;
  white-space: nowrap;
}
@media (max-width: 480px) {
  .cat-tabs { gap: 18px; }
  .cat-tab-label { font-size: 10px; }
}

/* Hide scrollbars everywhere */
html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }

/* Section title */
.section { margin-bottom: 18px; scroll-margin-top: 18px; }
.section-title {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title::before {
  content: '';
  width: 18px;
  height: 1px;
  background: var(--text-tertiary);
  opacity: 0.6;
}
.section-title-text { display: inline-flex; align-items: center; gap: 8px; }
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
}

/* Card */
.card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  margin-bottom: 10px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: var(--glass-shadow);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 14px; right: 14px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
  pointer-events: none;
}

/* Empty state */
.empty-state {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  text-align: center;
  padding: 16px 0;
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.empty-state::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-quaternary);
  flex-shrink: 0;
}

/* ============================================================
   SHOPPING LIST
   ============================================================ */
.shop-scroll { overflow-x: auto; }
.shop-add-row,
.shop-row {
  display: grid;
  grid-template-columns: 1.6fr 0.8fr 0.6fr 1.1fr 0.9fr auto;
  gap: 8px;
  align-items: center;
  min-width: 560px;
}
.shop-add-row {
  padding: 8px;
  background: rgba(0, 0, 0, 0.30);
  border-radius: 12px;
  margin-bottom: 14px;
}
.shop-input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  outline: none;
  color: var(--text-primary);
  padding: 9px 10px;
  font-family: inherit;
  font-size: 13px;
  min-width: 0;
  -moz-appearance: textfield;
}
.shop-input::-webkit-outer-spin-button,
.shop-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.shop-input::placeholder { color: var(--text-tertiary); }
.shop-input:focus { border-color: rgba(255,255,255,0.24); }
.shop-lasts-group { display: flex; gap: 4px; min-width: 0; }
.shop-lasts-group .shop-input:first-child { flex: 1.2; min-width: 0; }
.shop-select {
  flex: 1; min-width: 0;
  cursor: pointer; appearance: none; -webkit-appearance: none;
  text-align: center;
  color-scheme: dark;
}
.shop-add-btn {
  padding: 0 16px;
  background: linear-gradient(180deg, var(--accent), #C65D42);
  color: #fff; border: none;
  border-radius: 9px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  transition: transform 0.12s, box-shadow 0.18s;
}
.shop-add-btn:hover { transform: translateY(-1px); }
.shop-add-btn:active { transform: scale(0.97); }

.shop-list-head {
  padding: 0 12px 8px;
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-tertiary);
  font-family: var(--font-mono);
}
.shop-list-head span:last-child { visibility: hidden; }

.shop-row {
  padding: 10px 12px;
  background: rgba(255,255,255,0.025);
  border-radius: 10px;
  margin-bottom: 6px;
}
.shop-row:hover { background: rgba(255,255,255,0.045); }
.shop-cell {
  font-size: 13px; color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.shop-cell-name { color: var(--text-primary); font-weight: 600; }
.shop-cell-est { color: var(--text-primary); font-weight: 700; font-family: var(--font-mono); }
.shop-cell-est.is-blank { color: var(--text-tertiary); font-weight: 400; font-style: italic; }
.shop-row-actions { display: flex; gap: 4px; justify-self: end; }
.shop-row-edit, .shop-row-del {
  background: transparent; border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-tertiary);
  cursor: pointer; font-size: 13px;
  padding: 4px 8px; border-radius: 6px;
  font-family: inherit; line-height: 1;
}
.shop-row-edit:hover { color: var(--text-primary); }
.shop-row-del:hover { color: var(--danger); }
.shop-row-edit-actions { display: flex; gap: 6px; }
.shop-row-save, .shop-row-cancel {
  padding: 8px 12px;
  border-radius: 8px;
  font-family: inherit; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.shop-row-save { border: none; background: var(--accent); color: #fff; }
.shop-row-cancel { border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--text-primary); }

@media (max-width: 720px) {
  .shop-list-head { display: none; }
}
</style>
</head>
<body>
<div class="shell">

<!-- ===== Category tabs (matches dashboard.html) ===== -->
<div class="cat-tabs" role="tablist" aria-label="Site sections">
  <a class="cat-tab" href="dashboard.html">
    <span class="cat-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11 12 4l9 7"/><path d="M5 10v9a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1v-9"/></svg></span>
    <span class="cat-tab-label">Main</span>
  </a>
  <a class="cat-tab" href="health.html">
    <span class="cat-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M12 8v8M8 12h8"/></svg></span>
    <span class="cat-tab-label">Health</span>
  </a>
  <a class="cat-tab" href="gym.html">
    <span class="cat-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 9v6M17.5 9v6M3 10.5v3M21 10.5v3M6.5 12h11"/></svg></span>
    <span class="cat-tab-label">Fitness</span>
  </a>
  <a class="cat-tab" href="fuel.html">
    <span class="cat-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v6a2 2 0 1 0 4 0V3"/><path d="M8 9v12"/><path d="M16 3c2 1 3 3 3 6s-1 5-3 6"/><path d="M16 3v18"/></svg></span>
    <span class="cat-tab-label">Fuel</span>
  </a>
  <a class="cat-tab" href="peak.html">
    <span class="cat-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20 9 8l4 6 2-3 6 9Z"/></svg></span>
    <span class="cat-tab-label">Peak</span>
  </a>
  <a class="cat-tab" href="finance.html">
    <span class="cat-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h13a1 1 0 0 1 1 1v3"/><path d="M3 7v10a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1H6a2 2 0 0 1-2-2"/><circle cx="17" cy="13" r="1.4"/></svg></span>
    <span class="cat-tab-label">Finance</span>
  </a>
  <a class="cat-tab is-active" href="planner.html" aria-current="page">
    <span class="cat-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M9 12l2 2 4-4"/></svg></span>
    <span class="cat-tab-label">Planner</span>
  </a>
</div>

<!-- ===== SHOPPING LIST ===== -->
<div class="section" data-section="shopping" id="shopping-list">
  <div class="section-title">
    <span class="section-title-text">SHOPPING LIST</span>
  </div>
  <div class="card">
    <div class="shop-scroll">
      <div class="shop-add-row">
        <input type="text" class="shop-input" id="shopNameInput" placeholder="Item name…">
        <input type="number" class="shop-input" id="shopGramsInput" placeholder="Grams" min="0">
        <input type="number" class="shop-input" id="shopQtyInput" placeholder="Qty" min="1" value="1">
        <div class="shop-lasts-group">
          <input type="number" class="shop-input" id="shopLastsInput" placeholder="Lasts" min="0">
          <select class="shop-input shop-select" id="shopLastsUnitInput">
            <option value="days">days</option>
            <option value="weeks">weeks</option>
            <option value="months">months</option>
          </select>
        </div>
        <input type="number" class="shop-input" id="shopEstDaysInput" placeholder="Est. days" min="0">
        <button type="button" class="shop-add-btn" id="shopAddBtn">+ Add</button>
      </div>
      <div class="shop-list-head shop-row">
        <span>Item</span><span>Grams</span><span>Qty</span><span>Lasts</span><span>Est. left</span><span>Actions</span>
      </div>
      <div id="shopList"></div>
    </div>
    <div class="empty-state" id="shopEmptyState" style="display:none;">No shopping list items yet — add one above.</div>
  </div>
</div>

</div>

<script>
(function () {
  'use strict';

  // ---------- storage helpers (same interface as dashboard.html) ----------
  function storeGet(key) {
    try { const raw = localStorage.getItem(key); return raw == null ? null : JSON.parse(raw); }
    catch (e) { return null; }
  }
  function storeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  }

  // ---------- Shopping list ----------
  const SHOP_KEY = 'shopping_list_v1';
  function getShopItems() { const v = storeGet(SHOP_KEY); return Array.isArray(v) ? v : []; }
  function setShopItems(list) { storeSet(SHOP_KEY, list); }

  let shopEditingId = null;

  function formatLasts(item) {
    return item.lastsValue ? item.lastsValue + ' ' + item.lastsUnit : '—';
  }

  function buildShopEditRow(item) {
    const row = document.createElement('div');
    row.className = 'shop-row';
    row.dataset.id = item.id;
    row.innerHTML =
      '<input type="text" class="shop-input shop-edit-name">' +
      '<input type="number" class="shop-input shop-edit-grams" min="0">' +
      '<input type="number" class="shop-input shop-edit-qty" min="1">' +
      '<div class="shop-lasts-group">' +
        '<input type="number" class="shop-input shop-edit-lasts" min="0">' +
        '<select class="shop-input shop-select shop-edit-lasts-unit">' +
          '<option value="days">days</option>' +
          '<option value="weeks">weeks</option>' +
          '<option value="months">months</option>' +
        '</select>' +
      '</div>' +
      '<input type="number" class="shop-input shop-edit-est" min="0">' +
      '<div class="shop-row-edit-actions">' +
        '<button type="button" class="shop-row-save">Save</button>' +
        '<button type="button" class="shop-row-cancel">Cancel</button>' +
      '</div>';
    row.querySelector('.shop-edit-name').value = item.name;
    row.querySelector('.shop-edit-grams').value = item.grams || '';
    row.querySelector('.shop-edit-qty').value = item.qty || 1;
    row.querySelector('.shop-edit-lasts').value = item.lastsValue || '';
    row.querySelector('.shop-edit-lasts-unit').value = item.lastsUnit || 'days';
    row.querySelector('.shop-edit-est').value = item.estDays != null ? item.estDays : '';

    row.querySelector('.shop-row-save').addEventListener('click', () => {
      const name = row.querySelector('.shop-edit-name').value.trim();
      if (!name) return;
      const grams = Number(row.querySelector('.shop-edit-grams').value) || 0;
      const qty = Number(row.querySelector('.shop-edit-qty').value) || 1;
      const lastsValue = Number(row.querySelector('.shop-edit-lasts').value) || 0;
      const lastsUnit = row.querySelector('.shop-edit-lasts-unit').value;
      const estRaw = row.querySelector('.shop-edit-est').value;
      const estDays = estRaw === '' ? null : Number(estRaw);
      const list = getShopItems();
      const idx = list.findIndex(x => x.id === item.id);
      if (idx !== -1) {
        list[idx] = Object.assign({}, list[idx], { name, grams, qty, lastsValue, lastsUnit, estDays });
        setShopItems(list);
      }
      shopEditingId = null;
      renderShopList();
    });
    row.querySelector('.shop-row-cancel').addEventListener('click', () => {
      shopEditingId = null;
      renderShopList();
    });
    return row;
  }

  function buildShopRow(item) {
    if (shopEditingId === item.id) return buildShopEditRow(item);

    const row = document.createElement('div');
    row.className = 'shop-row';
    row.dataset.id = item.id;
    const estBlank = item.estDays == null || item.estDays === '';
    row.innerHTML =
      '<span class="shop-cell shop-cell-name"></span>' +
      '<span class="shop-cell">' + (item.grams ? item.grams + 'g' : '—') + '</span>' +
      '<span class="shop-cell">x' + (item.qty || 1) + '</span>' +
      '<span class="shop-cell">' + formatLasts(item) + '</span>' +
      '<span class="shop-cell shop-cell-est' + (estBlank ? ' is-blank' : '') + '">' + (estBlank ? '—' : item.estDays + 'd') + '</span>' +
      '<span class="shop-row-actions">' +
        '<button type="button" class="shop-row-edit" aria-label="Edit item">✎</button>' +
        '<button type="button" class="shop-row-del" aria-label="Delete item">×</button>' +
      '</span>';
    row.querySelector('.shop-cell-name').textContent = item.name;

    row.querySelector('.shop-row-edit').addEventListener('click', () => {
      shopEditingId = item.id;
      renderShopList();
    });
    row.querySelector('.shop-row-del').addEventListener('click', () => {
      setShopItems(getShopItems().filter(x => x.id !== item.id));
      renderShopList();
    });
    return row;
  }

  function renderShopList() {
    const wrap = document.getElementById('shopList');
    const emptyState = document.getElementById('shopEmptyState');
    const head = document.querySelector('.shop-list-head');
    if (!wrap) return;
    const list = getShopItems();
    wrap.innerHTML = '';
    emptyState.style.display = list.length ? 'none' : '';
    head.style.display = list.length ? '' : 'none';
    list.forEach(item => wrap.appendChild(buildShopRow(item)));
  }

  function initShopAddForm() {
    document.getElementById('shopAddBtn').addEventListener('click', () => {
      const nameEl = document.getElementById('shopNameInput');
      const gramsEl = document.getElementById('shopGramsInput');
      const qtyEl = document.getElementById('shopQtyInput');
      const lastsEl = document.getElementById('shopLastsInput');
      const lastsUnitEl = document.getElementById('shopLastsUnitInput');
      const estEl = document.getElementById('shopEstDaysInput');

      const name = nameEl.value.trim();
      if (!name) return;
      const grams = Number(gramsEl.value) || 0;
      const qty = Number(qtyEl.value) || 1;
      const lastsValue = Number(lastsEl.value) || 0;
      const lastsUnit = lastsUnitEl.value;
      const estRaw = estEl.value;
      const estDays = estRaw === '' ? null : Number(estRaw);

      const list = getShopItems();
      list.push({
        id: 'sh' + Date.now() + Math.random().toString(36).slice(2, 7),
        name, grams, qty, lastsValue, lastsUnit, estDays
      });
      setShopItems(list);

      nameEl.value = '';
      gramsEl.value = '';
      qtyEl.value = '1';
      lastsEl.value = '';
      lastsUnitEl.value = 'days';
      estEl.value = '';
      renderShopList();
    });
  }

  renderShopList();
  initShopAddForm();

  // Re-render if storage changes from another tab.
  window.addEventListener('storage', renderShopList);
})();
</script>

</body>
</html>
