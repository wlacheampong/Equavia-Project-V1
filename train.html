<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script src="landing-guard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="vitality-bridge.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#050506" />
<link rel="icon" type="image/webp" href="images/Index Landing Page.webp">
<link rel="apple-touch-icon" href="images/Index Landing Page.webp">
<title>Train</title>
<script src="topbar.js" defer></script>
<script>
(function () {
  // This page has its own top navigation (the category tab row, matching
  // dashboard.html), so the shared bottom tab bar from topbar.js is
  // redundant here. DOMContentLoaded always fires after every deferred
  // script has run, so waiting for it guarantees the element exists
  // before we remove it. (Note: `defer` has no effect on inline scripts,
  // so we can't rely on script order alone — this listener is what
  // actually delays us.)
  document.addEventListener('DOMContentLoaded', function () {
    var bottombar = document.getElementById('bottombar');
    if (bottombar) bottombar.remove();
    document.body.classList.remove('has-bottombar');
    // Embedded (e.g. inside gym.html's Fitness tile) — the host page
    // already has its own category-tab nav and starter banner, so this
    // page's copies would just be a redundant second nav bar.
    if (window.self !== window.top) {
      var catTabs = document.querySelector('.cat-tabs');
      if (catTabs) catTabs.remove();
      var starterTag = document.querySelector('.starterTag');
      if (starterTag) starterTag.remove();
    }
  });
})();
</script>

<style>
  /* ====================================================================
     Vitality workout logger — Push / Pull / Legs, fully self-contained.
     Extracted verbatim from the Logger Design Lab (chrome stripped).
     The whole Vitality look — fonts + mountains/glass/particles backdrop —
     is baked in below, so it renders with NO external file. Mint accent
     (#6EE7B7); amber (#f59e0b) ONLY for a PR / your best.
     ================================================================= */
  :root {
    /* Vitality tokens — reskin of the Patron logger */
    --bg:#050506; --surface:#0e0e11; --border:#1d1d22; --mint:#6EE7B7; --muted:#84848c; --fg:#ededf0;
    /* semantic accents kept (like fuel.html keeps --neg) — gold flags a PR, fail a miss */
    --gold:#f59e0b; --fail:#e06a6c; --ink:#04140d;
    /* logger-internal aliases mapped onto the Vitality tokens */
    --card:#0e0e11; --row:#141419; --line:#1d1d22; --hair:#2a2a31; --border-strong:#2a2a31;
    --mint-ic:#6EE7B7; --text:#ededf0; --muted-strong:#a8a8b0;
    /* system font stack only — no external fonts (from fuel.html) + a system serif for the italic display */
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
    --vt-sans:var(--font-display); --vt-mono:var(--font-mono); --vt-serif:Georgia,"Times New Roman",serif;
    --font-serif:Georgia,"Times New Roman",serif; --serif:Georgia,"Times New Roman",serif; --sans:var(--font-display);
    --spring: cubic-bezier(.34,1.56,.64,1); --ease: cubic-bezier(.2,.8,.2,1);
    --radius-lg:12px; --radius-pill:999px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  ::selection { background: var(--mint); color: var(--ink); }
  html { background: var(--bg); }
  body { margin:0; min-height:100dvh; padding: max(16px, env(safe-area-inset-top)) 14px calc(40px + env(safe-area-inset-bottom)); display:flex; background:transparent; color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
  /* flex parent + margin:auto centers the sheet both ways when there's room,
     and still scrolls from the top (title never clipped) when it doesn't. */
  .shell { width: 100%; max-width: 920px; margin: auto; }

  /* ── inlined Vitality backdrop — mountains / glass atmosphere / particles,
        fully self-contained so it renders with NO external file ── */
  #vt-backdrop { position:fixed; inset:0; z-index:-1; pointer-events:none; overflow:hidden; background:var(--bg); }
  #vt-backdrop.lift { z-index:55; }
  #vt-backdrop .wb-atmosphere { position:absolute; inset:0; pointer-events:none; background:
    radial-gradient(60% 50% at 50% 40%, rgba(110,231,183,.18) 0%, rgba(110,231,183,.06) 32%, rgba(110,231,183,0) 66%),
    radial-gradient(34% 26% at 50% 44%, rgba(255,226,181,.08) 0%, rgba(255,226,181,0) 72%),
    radial-gradient(130% 90% at 50% 120%, rgba(14,38,30,.85) 0%, rgba(0,0,0,1) 72%); }
  #vt-backdrop .wb-mountains { position:absolute; left:0; right:0; bottom:0; height:42vh; min-height:240px; pointer-events:none; }
  #vt-backdrop .wb-mountains svg { width:100%; height:100%; display:block; }
  #vt-backdrop .wb-mist { position:absolute; left:0; right:0; bottom:30vh; height:24vh; pointer-events:none; background:linear-gradient(to top, rgba(0,0,0,0) 0%, rgba(110,231,183,.06) 40%, rgba(0,0,0,0) 100%); filter:blur(8px); }
  #vt-backdrop .wb-particles { position:absolute; inset:0; pointer-events:none; }
  #vt-backdrop .wb-particles span { position:absolute; width:1.5px; height:1.5px; background:rgba(233,239,233,.55); border-radius:50%; box-shadow:0 0 4px rgba(167,243,208,.35); animation:vtDrift linear infinite; }
  @keyframes vtDrift { 0%{transform:translate3d(0,0,0);opacity:0;} 8%{opacity:.7;} 92%{opacity:.5;} 100%{transform:translate3d(var(--dx,12px),var(--dy,-100vh),0);opacity:0;} }
  /* grain overlay removed to keep the tile free of any external/namespace URL */
  @media (prefers-reduced-motion:reduce) { #vt-backdrop .wb-particles span { animation:none; } }
  button { font-family: inherit; }
  .num, .val, .pillValue, .stat .v, .repDot, td .num, .axis-label { font-variant-numeric: tabular-nums; }

  /* ── the logger sheet ─────────────────────────────────────────────── */
  .sheet { position: relative; width: 100%; max-width: 800px; margin: 0 auto; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 30px 34px 32px; backdrop-filter: blur(20px) saturate(1.2); -webkit-backdrop-filter: blur(20px) saturate(1.2); opacity: 0; transform: translateY(14px); animation: rise .6s var(--spring) forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .eyebrow { font-family: var(--vt-mono); text-transform: uppercase; letter-spacing: .2em; font-size: 11px; font-weight: 600; color: var(--muted); }

  /* day tabs */
  .daytabs { display:flex; gap:3px; background: var(--row); border:1px solid var(--line); border-radius:12px; padding:4px; margin-top:14px; }
  .daytab { flex:1; background:none; border:none; color:var(--muted); font-family:var(--sans); font-size:13px; font-weight:600; padding:9px 6px; border-radius:9px; cursor:pointer; transition: color .2s, background .25s; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  .daytab.on { background: var(--mint); color: var(--ink); }
  .daytab .tnum { font-variant-numeric: tabular-nums; opacity:.6; font-size:10px; margin-left:5px; }
  .daytab.on .tnum { opacity:.55; }
  /* long-press a tab to rename/delete it; the + tab always adds a new one */
  .daytab.addtab { flex:0 0 auto; width:34px; display:flex; align-items:center; justify-content:center; padding:9px 0; }
  .daytab.addtab svg { width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; }
  .daytab.addtab:hover { color: var(--mint); }

  /* dotted per-exercise progress for the active day */
  .daydots { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:8px; margin-top:16px; min-height:9px; }
  .daydots .dd { width:8px; height:8px; border-radius:50%; border:1.5px solid var(--hair); transition: background .3s, border-color .3s; }
  .daydots .dd.done { background: var(--mint); border-color: var(--mint); }
  .daydots .dd.pr { background: var(--gold); border-color: var(--gold); }
  .daydots .dd.miss { border-color: var(--fail); }

  /* day header */
  .dayhead { display:flex; align-items:flex-end; gap:12px; margin-top:14px; }
  .daytitle { font-family: var(--serif); font-style:italic; font-weight:500; font-size:33px; line-height:1; letter-spacing:-0.01em; }
  .daypill { font-family: var(--vt-mono); font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; padding:4px 9px; border-radius:999px; border:1px solid var(--mint); color:var(--mint); align-self:center; margin-bottom:4px; }
  .daypill.vol { border-color: var(--hair); color: var(--muted-strong); }
  .moonbtn { margin-left:auto; align-self:center; margin-bottom:3px; display:inline-flex; align-items:center; gap:7px; background:none; border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:7px 12px; font-size:12px; font-weight:500; cursor:pointer; transition: color .18s, border-color .18s, background .18s; }
  .moonbtn:hover { color: var(--muted-strong); border-color: var(--hair); }
  .moonbtn.on { color: var(--mint); border-color: var(--mint); background: rgba(110,231,183,.06); }
  .moonbtn svg { width:14px; height:14px; fill: currentColor; }

  /* overall progress */
  .progress { margin-top:18px; }
  .ptrack { height:5px; border-radius:999px; background: rgba(255,255,255,.07); overflow:hidden; }
  .pfill { height:100%; border-radius:999px; background: linear-gradient(90deg,#3ddc97,#a7f3d0); transition: width .5s var(--ease); }
  .plabel { font-family: var(--serif); font-style:italic; font-size:14px; color: var(--muted); margin-top:9px; }
  .plabel b { color: var(--text); font-weight:500; }

  /* exercises */
  .exwrap { margin-top:6px; }
  .ex { padding: 18px 0 20px; position:relative; transition: opacity .2s; }
  .ex + .ex { border-top: 1px solid var(--line); }
  .ex.drag-ghost { opacity:.4; }
  .ex.celebrate::before { content:""; position:absolute; inset:-6px -2px; border-radius:16px; pointer-events:none; z-index:0; animation: exGlow 1.6s var(--ease) forwards; }
  .ex.celebrate::after { content:""; position:absolute; inset:-6px -2px; border-radius:16px; border:1.5px solid rgba(245,158,11,.7); pointer-events:none; z-index:0; animation: exRing 1.6s var(--ease) forwards; }
  @keyframes exGlow { 0%{box-shadow:0 0 0 0 rgba(245,158,11,0);} 22%{box-shadow:0 0 56px -4px rgba(245,158,11,.5);} 100%{box-shadow:0 0 0 0 rgba(245,158,11,0);} }
  @keyframes exRing { 0%{opacity:0;transform:scale(.99);} 18%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(1.01);} }
  .ex > * { position:relative; z-index:1; }

  .exHead { display:flex; align-items:center; gap:9px; }
  .grip { flex:none; width:20px; height:26px; display:grid; place-items:center; color: rgba(255,255,255,.22); cursor:grab; touch-action:none; background:none; border:none; padding:0; }
  .grip:hover { color: var(--muted); }
  .grip.dragging { cursor:grabbing; }
  .grip svg { width:14px; height:14px; fill: currentColor; }
  .exEye { flex:none; display:inline-flex; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; color: var(--muted); width:24px; height:24px; transition: color .15s; }
  .exEye:hover { color: var(--mint); }
  .exEye svg { width:21px; height:21px; stroke: currentColor; fill:none; stroke-width:1.5; }
  .exName { font-family: var(--serif); font-style:italic; font-weight:400; font-size:25px; line-height:1.05; letter-spacing:-0.01em; color: var(--text); flex:1; min-width:0; border:none; background:none; text-align:left; cursor:pointer; padding:0; display:inline-flex; align-items:baseline; gap:7px; word-break:break-word; }
  .exName:hover .nameTxt { text-decoration: underline; text-decoration-color: rgba(110,231,183,.5); text-underline-offset:3px; }
  .exInfo { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; font-family: var(--serif); font-style:italic; font-size:12px; font-weight:600; color: var(--mint); background: rgba(110,231,183,.05); border:1px solid rgba(110,231,183,.25); border-radius:50%; line-height:1; align-self:center; flex:none; }
  .pinBtn { flex:none; background:none; border:none; cursor:pointer; color: rgba(255,255,255,.22); font-size:17px; line-height:1; padding:4px; transition: color .15s, transform .15s var(--spring); }
  .pinBtn:hover { color: var(--muted); } .pinBtn:active { transform: scale(.85); }
  .pinBtn.on { color: var(--mint); }
  .menuBtn { flex:none; background:none; border:none; cursor:pointer; color: var(--muted); padding:4px 6px; border-radius:8px; transition: color .15s, background .15s; }
  .menuBtn:hover { color: var(--text); background: rgba(255,255,255,.05); }
  .menuBtn svg { width:18px; height:18px; fill: currentColor; }

  .exMeta { font-size:11px; font-weight:600; color: var(--muted); letter-spacing:.12em; text-transform:uppercase; display:flex; align-items:center; gap:7px; flex-wrap:wrap; padding-left:29px; margin-top:10px; }
  .metaSep { opacity:.4; }
  .exNote { padding-left:29px; margin-top:9px; font-size:13px; color: var(--muted-strong); font-style:italic; display:flex; gap:7px; align-items:baseline; }
  .exNote .ndot { color: var(--mint); }
  .deloadTag { color: var(--muted-strong); border:1px solid var(--hair); border-radius:4px; padding:1px 6px; font-size:9px; letter-spacing:.12em; }

  .exActions { display:flex; align-items:center; flex-wrap:wrap; gap:7px; padding-left:29px; margin-top:14px; }
  .actionPill { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; font-size:12px; color: var(--mint); background: rgba(110,231,183,.04); border:1px solid rgba(110,231,183,.25); border-radius: var(--radius-pill); cursor:pointer; white-space:nowrap; box-shadow: 0 0 16px rgba(110,231,183,.10); transition: color .15s, border-color .15s, background .15s, box-shadow .48s var(--ease), transform .15s var(--spring); }
  .actionPill:hover { color: #fff; border-color: var(--mint); background: rgba(110,231,183,.12); box-shadow: 0 0 22px rgba(110,231,183,.20); transform: translateY(-1px); }
  .actionPill:active { transform: scale(.96); }
  .actionPill svg { width:13px; height:13px; stroke: currentColor; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
  .actionPill .pl { font-family: var(--serif); font-style:italic; letter-spacing:.01em; font-size:13px; }

  /* set pills */
  .pills { display:flex; flex-direction:column; gap:10px; width:100%; margin-top:16px; }
  .pill { display:flex; align-items:center; gap:11px; padding:13px 15px; border-radius:14px; border:1px solid var(--line); background: rgba(255,255,255,.022); position:relative; overflow:hidden; transition: background .48s var(--ease), border-color .48s var(--ease), box-shadow .48s var(--ease), color .48s var(--ease); }
  .pill.tappable { cursor:pointer; }
  .pillIdx { font-family: var(--serif); font-style:italic; font-size:15px; color: var(--muted); width:18px; flex:none; }
  .pillValue { font-size:17px; letter-spacing:-0.01em; font-weight:500; display:inline-flex; align-items:baseline; }
  .pillTimes { color: var(--muted); margin:0 6px; font-weight:400; }
  .pillUnit { color: var(--muted); font-family: var(--serif); font-style:italic; font-size:.7em; margin-left:3px; letter-spacing:.02em; font-variant-numeric:normal; }
  .pillPerHand { margin-left:1px; font-size:.85em; opacity:.7; }
  .pillInput { background:transparent; border:none; outline:none; color:inherit; font:inherit; font-weight:600; font-variant-numeric: tabular-nums; text-align:center; -moz-appearance:textfield; appearance:textfield; min-width:1.7ch; width:2.6ch; padding:0 1px; border-bottom:1px solid transparent; transition: border-color .15s, color .15s; }
  .pillInput.r { width:1.9ch; }
  .pillInput::-webkit-outer-spin-button, .pillInput::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .pill:hover .pillInput { border-bottom-color: rgba(110,231,183,.22); }
  .pillInput:focus { color: var(--mint); border-bottom-color: var(--mint); }
  .pillSpacer { flex:1; }
  .pillActions { display:inline-flex; align-items:center; gap:9px; }
  .pillHit { background:none; border:none; font-family: var(--serif); font-style:italic; font-size:14px; color: var(--mint); cursor:pointer; white-space:nowrap; padding:2px; transition: color .15s; }
  .pillMiss { background:none; border:none; font-family: var(--serif); font-style:italic; font-size:14px; color: var(--muted); cursor:pointer; padding:2px; transition: color .15s; }
  .pillMiss:hover { color: var(--fail); }
  .pillStatus { font-family: var(--serif); font-style:italic; font-size:14px; cursor:default; }
  .pillPr { font-style:italic; color: var(--gold); }
  .pillReset { background:none; border:none; cursor:pointer; padding:6px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:currentColor; opacity:.55; transition: opacity .15s, background .15s; }
  .pillReset svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
  .pillReset:hover { opacity:1; background: rgba(0,0,0,.12); }
  .pill.done { background: var(--mint); border-color: var(--mint); color:#000; box-shadow: 0 0 22px rgba(110,231,183,.28); }
  .pill.done .pillIdx, .pill.done .pillTimes, .pill.done .pillUnit { color: rgba(0,0,0,.5); }
  .pill.done .pillInput { color:#000; }
  .pill.done .pillHit, .pill.done .pillStatus { color:#000; font-weight:600; }
  .pill.done .pillStatus .sub { color: rgba(0,0,0,.55); font-weight:500; }
  .pill.failed { background: rgba(224,106,108,.12); border-color: var(--fail); color: var(--text); }
  .pill.failed .pillIdx, .pill.failed .pillStatus { color: var(--fail); }
  .pill.failed .pillValue { text-decoration: line-through; color: var(--muted-strong); }
  .pill.shimmer::after { content:""; position:absolute; inset:0; pointer-events:none; background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.5) 50%, transparent 70%); transform: translateX(-120%); animation: pillShimmer .8s var(--ease); }
  @keyframes pillShimmer { to { transform: translateX(120%); } }

  /* collapsed card */
  .ex.collapsed .exMeta, .ex.collapsed .exActions, .ex.collapsed .pills, .ex.collapsed .exNote, .ex.collapsed .restSlot { display:none; }
  .ex.collapsed .collapsedNote { display:flex; }
  .collapsedNote { display:none; padding-left:29px; margin-top:8px; font-size:12px; color: var(--muted); font-style:italic; }

  /* rest timer */
  .restSlot:empty { display:none; }
  .restbar { display:flex; align-items:center; justify-content:center; gap:13px; margin-top:16px; margin-left:29px; padding:9px 13px; border:1px solid var(--mint); border-radius:999px; background: rgba(110,231,183,.06); }
  .restbar.over { border-color: var(--gold); }
  .restStep { background:none; border:1px solid var(--hair); color: var(--text); border-radius:999px; padding:5px 11px; cursor:pointer; font-size:12px; font-variant-numeric: tabular-nums; transition: border-color .15s; }
  .restStep:hover { border-color: var(--mint); }
  .restMid { text-align:center; min-width:108px; }
  .restTime { font-family: var(--serif); font-style:italic; font-size:20px; color: var(--mint); font-variant-numeric: tabular-nums; }
  .restbar.over .restTime { color: var(--gold); }
  .restLabel { font-family: var(--vt-mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color: var(--muted); margin-top:1px; }
  .restX { background:none; border:none; color: var(--muted); cursor:pointer; font-size:18px; line-height:1; padding:2px 5px; }
  .restX:hover { color: var(--text); }

  /* add a lift + rest-day panel */
  .addLift { display:flex; flex-direction:column; align-items:center; gap:9px; margin:8px auto 0; background:none; border:none; cursor:pointer; padding:18px; width:100%; }
  .addLiftRing { width:42px; height:42px; border-radius:50%; border:1px solid var(--mint); display:grid; place-items:center; color: var(--mint); transition: background .2s, transform .15s var(--spring); }
  .addLift:hover .addLiftRing { background: rgba(110,231,183,.08); }
  .addLift:active .addLiftRing { transform: scale(.92); }
  .addLiftRing svg { width:18px; height:18px; stroke: currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; }
  .addLiftLabel { font-family: var(--serif); font-style:italic; font-size:15px; color: var(--mint); }

  .restPanel { text-align:center; padding:38px 16px 30px; }
  .restPanel .moon { width:46px; height:46px; margin:0 auto; color: var(--muted); }
  .restPanel .moon svg { width:100%; height:100%; fill: currentColor; }
  .restPanel h3 { font-family: var(--serif); font-style:italic; font-weight:500; font-size:26px; margin:14px 0 0; }
  .restPanel p { font-size:14px; line-height:1.6; color: var(--muted-strong); max-width:480px; margin:12px auto 0; }
  .restPanel .undo { margin-top:18px; background:none; border:none; color: var(--mint); font-family: var(--serif); font-style:italic; font-size:14px; cursor:pointer; }

  /* finish footer */
  .finishRow { margin-top:22px; }
  .finishBtn { width:100%; border:none; border-radius:14px; padding:15px; font-family: var(--sans); font-size:15px; font-weight:600; cursor:pointer; background: var(--mint); color: var(--ink); transition: transform .18s var(--spring), opacity .2s; }
  .finishBtn:active { transform: scale(.99); }
  .finishBtn:disabled { opacity:.4; cursor:default; }
  .finishBtn.locked { background: rgba(110,231,183,.12); color: var(--mint); border:1px solid var(--mint); }
  .freshbtn { display:block; margin: 13px auto 0; background:none; border:none; color: var(--muted); font-family: var(--sans); font-size:12.5px; font-weight:500; cursor:pointer; padding:8px 12px; border-radius:9px; transition: color .18s; }
  .freshbtn:hover { color: var(--text); } .freshbtn.arm { color: var(--fail); font-weight:600; }
  .store-note { text-align:center; color: var(--muted); font-size:11.5px; font-weight:500; margin-top:6px; opacity:.85; }

  /* ── popups (history / form / swap / tune / overflow menu) ─────────── */

/* ====================================================================
   THE LOGGER. (Verbatim from the Logger Design Lab.)
   Push / Pull / Legs program + per-set logging, fully self-contained.

/* ---- date helpers (local time, never toISOString) ------------------ */
const DAY = 86400000;
const pad = n => String(n).padStart(2,'0');
const ymd = d => d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
function getLocalDateKey(d=new Date()){ return ymd(d); }
const today = getLocalDateKey();
function dayKeyAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return ymd(d); }
function fmtDate(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function daysAgo(k){ const [y,m,d]=k.split('-').map(Number); const t=new Date(); t.setHours(0,0,0,0); return Math.round((t-new Date(y,m-1,d))/DAY); }
const r1 = n => Math.round(n*10)/10;
const ROMAN = ['i','ii','iii','iv','v','vi','vii','viii','ix','x'];
function mmss(s){ return Math.floor(s/60)+':'+pad(s%60); }
const TIER_LABEL = { 1:'tier 1', 2:'tier 2', 3:'tier 3', ab:'abs' };

/* ---- the program: Luke's real Push / Pull / Legs split ------------- */
/* Structure (which lifts, tier, target sets x reps) is real. The kg are a
   realistic starting prescription; a real user retunes them.            */

    { id:'incl_db_press',   name:'Incline DB press',     tier:2, sets:3, reps:10, kg:32.5, perHand:true, rest:120 },
    { id:'cable_fly',       name:'Cable chest fly',      tier:3, sets:3, reps:12, kg:18,   rest:75  },
    { id:'cable_lat_raise', name:'Cable lateral raise',  tier:3, sets:4, reps:12, kg:9,    rest:60  },
    { id:'tri_pushdown',    name:'Tricep rope pushdown', tier:3, sets:3, reps:12, kg:27.5, rest:75  },
    { id:'oh_tri_ext',      name:'Overhead cable tri ext', tier:3, sets:3, reps:12, kg:22.5, rest:75 },
  ]},
  pull: { name:'Pull', type:'Heavy', exercises:[

/* Ships clean. The program (PROGRAM) fills each day with lifts ready to log;
   there is no fake history or pre-logged sets. Real data loads via the bridge. */
const SEED = null;

/* ---- build / load state ------------------------------------------- */
function lastRealKg(id){
  const h = (SEED&&SEED.hist&&SEED.hist[id])||[]; const real = h.filter(s=>!s.off);
  return real.length ? real[real.length-1].kg : null;
}
function buildState(){
  const days = {};
  ORDER.forEach(key=>{
    const p = PROGRAM[key];
    days[key] = { name:p.name, type:p.type||'', restDay:!!p.restDay, off:false, ex:(p.exercises||[]).map(e=>{
      const seedLog = (SEED&&SEED.log&&SEED.log[e.id]) || null;
      const lk = lastRealKg(e.id);
      return { id:e.id, name:e.name, tier:e.tier, sets:e.sets, reps:e.reps, kg:e.kg, perHand:!!e.perHand, rest:e.rest||120,
        lastKg: (lk==null? null : lk), pinned:false, collapsed:false, deload:false, note:'',
        log: seedLog ? seedLog.map(s=>s?{kg:s.kg,reps:s.reps,fail:!!s.fail}:null) : Array(e.sets).fill(null),
        hist: (SEED&&SEED.hist&&SEED.hist[e.id]) ? JSON.parse(JSON.stringify(SEED.hist[e.id])) : [] };
    })};
  });
  return { active:(SEED&&SEED.active)||'push', unit:'kg', submitted:false, order: ORDER.slice(), days };
}
/* STATE is filled by the async boot below once the dashboard bridge resolves. */
let STATE = null;
/* Fire-and-forget persistence through the dashboard bridge (no device storage). */
function saveState(){ if(window.Vitality && typeof window.Vitality.save==='function') window.Vitality.save(STATE); }

/* ---- helpers on state -------------------------------------------- */
const curDay = () => STATE.days[STATE.active];
function sortedEx(day){ return day.ex.map((e,i)=>({e,i})).sort((a,b)=> (b.e.pinned-a.e.pinned)).map(o=>o.e); }
function prescription(e){ const kg = e.deload ? r1(e.kg*0.9) : e.kg; return { kg, reps:e.reps, sets:e.sets, rest:e.rest }; }
function classifySet(e, idx){ const s=e.log[idx]; if(!s) return 'empty'; if(s.fail) return 'failed'; return 'done'; }
function bestKg(e){ const real=e.hist.filter(s=>!s.off); return real.length? Math.max(...real.map(s=>s.kg)) : 0; }
function bestKgExclToday(e){ const real=e.hist.filter(s=>!s.off && s.date!==today); return real.length? Math.max(...real.map(s=>s.kg)) : 0; }
function bestRepsAt(e, kg){ const real=e.hist.filter(s=>!s.off && s.kg===kg); let m=0; real.forEach(s=>{ const t=Math.max(...s.sets.filter(x=>!x.fail).map(x=>x.r||0),0); if(t>m)m=t; }); return m; }
function isPR(e, idx){ const s=e.log[idx]; if(!s||s.fail) return false; const pb=bestKgExclToday(e); if(pb<=0) return false; if(s.kg>pb) return true; if(s.kg===pb && s.reps>bestRepsAt(e,pb)) return true; return false; }
function exDoneCount(e){ return e.log.filter(s=>s&&!s.fail).length; }
function exComplete(e){ return e.log.length>0 && e.log.every(s=>s&&!s.fail); }
function exHasPR(e){ return e.log.some((s,i)=>isPR(e,i)); }
function exHasMiss(e){ return e.log.some(s=>s&&s.fail); }
function dayTotals(day){ if(day.off||day.restDay) return {logged:0,total:0}; let logged=0,total=0; day.ex.forEach(e=>{ total+=e.log.length; logged+=e.log.filter(s=>s&&(s.fail||true)&&s).length; }); return {logged,total}; }

  const prefillKg = s?s.kg:(e.lastKg!=null?e.lastKg:rx.kg);
  const prefillR = s?s.reps:rx.reps;
  const pr = isPR(e, idx);
  const row=document.createElement('div'); row.className='pill '+(kind==='failed'?'failed':(kind==='done'?'done':''))+(logged?'':' tappable');
  let status='done';
  if(kind==='done'){ const dr=s.reps-rx.reps; if(dr>0) status='done <span class="sub">· +'+dr+'</span>'; else if(dr<0) status='done <span class="sub">· '+s.reps+' reps</span>'; else status='done'; }
  else if(kind==='failed') status='missed';
  row.innerHTML =
    '<span class="pillIdx">'+(ROMAN[idx]||idx+1)+'</span>'
    + '<span class="pillValue">'
    +   '<input class="pillInput w" type="number" inputmode="decimal" value="'+prefillKg+'" aria-label="Weight" />'
    +   '<span class="pillUnit">'+STATE.unit+(e.perHand?'<span class="pillPerHand">/ea</span>':'')+'</span>'
    +   '<span class="pillTimes">×</span>'
    +   '<input class="pillInput r" type="number" inputmode="numeric" value="'+prefillR+'" aria-label="Reps" />'
    + '</span>'
    + '<span class="pillSpacer"></span>'
    + '<div class="pillActions">'
    + (logged
        ? '<span class="pillStatus">'+(pr?'<span class="pillPr">★ </span>':'')+status+'</span><button class="pillReset" aria-label="Undo set">'+IC_reset()+'</button>'
        : '<button class="pillHit" aria-label="Log set">hit it →</button><button class="pillMiss" aria-label="Mark missed">miss</button>')
    + '</div>';
  const wIn=row.querySelector('.w'), rIn=row.querySelector('.r');
  const commit=()=>{ const kg=parseFloat(wIn.value); const reps=Math.round(parseFloat(rIn.value)); if(!Number.isFinite(kg)||kg<0||!Number.isFinite(reps)||reps<0) return; if(reps===0){ doLog(e, idx, kg, 0, true); } else { doLog(e, idx, kg, reps, false); } };
  const stop=ev=>ev.stopPropagation();
  [wIn,rIn].forEach(inp=>{ inp.addEventListener('click',stop); inp.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ ev.preventDefault(); commit(); inp.blur(); } }); });
  if(!logged) row.addEventListener('click', commit);
  const hit=row.querySelector('.pillHit'); if(hit) hit.addEventListener('click',ev=>{ stop(ev); commit(); });
  const miss=row.querySelector('.pillMiss'); if(miss) miss.addEventListener('click',ev=>{ stop(ev); const kg=parseFloat(wIn.value)|| (e.lastKg!=null?e.lastKg:rx.kg); doLog(e, idx, kg, 0, true); });
  const reset=row.querySelector('.pillReset'); if(reset) reset.addEventListener('click',ev=>{ stop(ev); e.log[idx]=null; stopRest(e.id); render(); });
  return row;
}
function IC_reset(){ return '<svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor"><path d="M3.5 6.5 A6 6 0 1 0 6 3.2"/><polyline points="2.4 2.4 3.7 6.6 8 5.2"/></svg>'; }

function doLog(e, idx, kg, reps, fail){
  const wasComplete = exComplete(e);
  const pbBefore = bestKgExclToday(e);
  e.log[idx] = fail ? {kg, reps:0, fail:true} : {kg, reps};
  rollupToday(e);
  render();
  // re-find the live card + pill for the shimmer / celebration
  const card=document.querySelector('.ex[data-id="'+e.id+'"]');
  if(!fail && card){ const pills=card.querySelectorAll('.pill'); const rowEl=pills[idx]; if(rowEl){ rowEl.classList.add('shimmer'); setTimeout(()=>rowEl.classList.remove('shimmer'),820); } }
  // progressive-overload celebration: a logged set that beats your prior best, completing the lift
  if(!fail && pbBefore>0 && (kg>pbBefore || (kg===pbBefore))){
    const beats = kg>pbBefore || (kg===pbBefore && reps>bestRepsAt(e,pbBefore));
    if(beats && !wasComplete && exComplete(e) && card){ card.classList.add('celebrate'); setTimeout(()=>card.classList.remove('celebrate'),1650); celebrate(e, kg, reps); }
  }
  if(!fail) startRest(e);
}
function rollupToday(e){
  const done = e.log.filter(s=>s&&!s.fail);
  e.hist = e.hist.filter(h=>h.date!==today);
  if(done.length){ const top=done.reduce((a,b)=>b.kg>a.kg?b:a); const sets=e.log.filter(s=>s).map(s=>s.fail?{r:s.reps,fail:true}:{r:s.reps}); e.hist.push({date:today, kg:top.kg, sets}); e.hist.sort((a,b)=>a.date.localeCompare(b.date)); e.lastKg=top.kg; }
}

/* ---- header actions router --------------------------------------- */
function handleAct(act, e, day, btn){
  if(act==='eye'){ e.collapsed=!e.collapsed; render(); }
  else if(act==='pin'){ e.pinned=!e.pinned; render(); }
  else if(act==='form'){ openForm(e); }
  else if(act==='history'){ openHistory(e); }
  else if(act==='swap'){ openSwap(e); }
  else if(act==='tune'){ openTune(e); }
  else if(act==='menu'){ openMenu(e, day, btn); }
}

/* ====================================================================
   REST TIMER
   ================================================================= */
const restTimers={};
function startRest(e){ stopRest(e.id); const rx=prescription(e); restTimers[e.id]={remaining:rx.rest, handle:null}; tickRest(e); const card=document.querySelector('.ex[data-id="'+e.id+'"]'); if(card) mountRestBar(card, e); }
function tickRest(e){ const t=restTimers[e.id]; if(!t) return; t.handle=setInterval(()=>{ t.remaining-=1; updateRest(e.id); },1000); }
function stopRest(id){ const t=restTimers[id]; if(t&&t.handle) clearInterval(t.handle); delete restTimers[id]; }
function mountRestBar(card, e){ const slot=card.querySelector('.restSlot'); const t=restTimers[e.id]; if(!t||!slot){ if(slot)slot.innerHTML=''; return; }
  const over=t.remaining<=0;
  slot.innerHTML='<div class="restbar'+(over?' over':'')+'"><button class="restStep" data-d="-15">−15</button><div class="restMid"><div class="restTime">'+(over?'go →':mmss(Math.max(0,t.remaining)))+'</div><div class="restLabel">'+e.name+'</div></div><button class="restStep" data-d="15">+15</button><button class="restX" aria-label="Dismiss">×</button></div>';
  slot.querySelector('[data-d="-15"]').onclick=()=>{ t.remaining-=15; updateRest(e.id); };
  slot.querySelector('[data-d="15"]').onclick=()=>{ t.remaining+=15; updateRest(e.id); };
  slot.querySelector('.restX').onclick=()=>{ stopRest(e.id); slot.innerHTML=''; };
}
function updateRest(id){ const card=document.querySelector('.ex[data-id="'+id+'"]'); const t=restTimers[id]; if(!card||!t) return; const bar=card.querySelector('.restbar'); if(!bar) return; const over=t.remaining<=0; bar.classList.toggle('over',over); bar.querySelector('.restTime').textContent= over?'go →':mmss(Math.max(0,t.remaining)); }

/* ====================================================================
   DRAG TO REORDER
   ================================================================= */
function wireDrag(card, e, day){
  const grip=card.querySelector('.grip'); if(!grip) return;
  grip.addEventListener('pointerdown', ev=>{
    if(e.pinned){ return; } // pinned lifts hold the top
    ev.preventDefault(); grip.classList.add('dragging'); card.classList.add('drag-ghost');
    const wrap=$('#exwrap'); const cards=[...wrap.querySelectorAll('.ex')];
    const move=mev=>{ const y=mev.clientY; let target=null; cards.forEach(c=>{ if(c===card) return; const r=c.getBoundingClientRect(); if(y>r.top && y<r.bottom) target=c; }); if(target){ const r=target.getBoundingClientRect(); const after = y > r.top + r.height/2; wrap.insertBefore(card, after?target.nextSibling:target); } };
    const up=()=>{ grip.classList.remove('dragging'); card.classList.remove('drag-ghost'); document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up);
      // commit new order to the day array (respecting pins at top)
      const ids=[...wrap.querySelectorAll('.ex')].map(c=>c.dataset.id);
      day.ex.sort((a,b)=> ids.indexOf(a.id)-ids.indexOf(b.id));
      render(); };
    document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
  });
}

const popHead = (eyebrow,title)=> '<div class="popHead"><div><div class="eyebrow">'+eyebrow+'</div><div class="popTitle">'+title+'</div></div><button class="popX" aria-label="Close">'+svg('<path d="M6 6l12 12M18 6L6 18"/>',' fill="none" stroke="currentColor"')+'</button></div>';

/* ---- history popup (the /overload tracker) ----------------------- */
const RANGES={ W:7, M:30, '3M':90, '6M':180, Y:365, ALL:99999 };
function openHistory(e){
  let active='ALL';
  openPop(popHead('History', e.name)
    + '<div class="range" id="hrange"></div>'
    + '<div class="chart-card"><div class="plot" id="hplot"></div><div class="delta-cap" id="hcap"></div></div>'
    + '<div class="stats" id="hstats"></div>'
    + '<table class="hist"><thead><tr><th>Date</th><th>Sets</th><th>Reps</th><th>Weight</th><th>Progress</th></tr></thead><tbody id="hbody"></tbody></table>',
    ()=>{ drawHistory(e, active, v=>{active=v;}); });
}
function drawHistory(e, active, setActive){
  const rangeEl=$('#hrange');
  rangeEl.innerHTML=Object.keys(RANGES).map(k=>'<button class="'+(k===active?'on':'')+'" data-r="'+k+'">'+k+'</button>').join('');
  rangeEl.querySelectorAll('button').forEach(b=> b.onclick=()=>{ setActive(b.dataset.r); drawHistory(e, b.dataset.r, setActive); });
  const all=e.hist.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const list=all.filter(s=>daysAgo(s.date)<=RANGES[active]);
  drawChart(e, list, active);
  drawStats(e);
  drawTable(e, all);
}
function topReps(s){ const d=(s.sets||[]).filter(x=>!x.fail).map(x=>x.r); return d.length?Math.max(...d):0; }
function setCount(s){ return (s.sets||[]).length; }
function drawChart(e, list, active){
  const plot=$('#hplot'), cap=$('#hcap');
  if(!list.length){ plot.innerHTML='<svg viewBox="0 0 600 240" preserveAspectRatio="none"><text class="xlab" x="300" y="120" text-anchor="middle">log your first session to start the chart</text></svg>'; cap.textContent=''; return; }
  const VB_W=600,VB_H=240,PADL=46,PADR=20,PADT=22,PADB=36;
  const real=list.filter(s=>!s.off), off=list.filter(s=>s.off);
  const ws=list.map(s=>s.kg);
  let lo=Math.max(0,Math.floor(Math.min(...ws)/5)*5-5), hi=Math.ceil(Math.max(...ws)/5)*5+5;
  if(hi-lo<10) hi=lo+10; if((hi-lo)%10!==0) hi+=5;
  const oldestAgo=Math.max(...list.map(s=>daysAgo(s.date)));
  const domain= active==='ALL'? Math.max(oldestAgo,1):Math.max(RANGES[active],1);
  const X=k=>{ const f=Math.min(1,Math.max(0,1-daysAgo(k)/domain)); return PADL+f*(VB_W-PADL-PADR); };
  const Y=kg=>(VB_H-PADB)-(kg-lo)/(hi-lo)*(VB_H-PADB-PADT);
  const step=(hi-lo)<=30?5:10;
  const best = real.length? real.reduce((b,s)=>(s.kg>b.kg||(s.kg===b.kg&&topReps(s)>topReps(b)))?s:b) : null;
  let svgs='<svg viewBox="0 0 '+VB_W+' '+VB_H+'" preserveAspectRatio="none"><defs><linearGradient id="fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" style="stop-color:var(--mint);stop-opacity:.22"/><stop offset="1" style="stop-color:var(--mint);stop-opacity:0"/></linearGradient></defs>';
  for(let kg=lo;kg<=hi;kg+=step){ svgs+='<line class="grid" x1="'+PADL+'" y1="'+Y(kg)+'" x2="'+(VB_W-PADR)+'" y2="'+Y(kg)+'"/><text class="axis-label" x="'+(PADL-10)+'" y="'+(Y(kg)+4)+'" text-anchor="end">'+kg+'</text>'; }
  if(real.length){ const pts=real.map(s=>X(s.date)+','+Y(s.kg)); const last=real[real.length-1], first=real[0];
    if(real.length>1){ svgs+='<path class="area" d="M'+X(first.date)+','+(VB_H-PADB)+' L'+pts.join(' L')+' L'+X(last.date)+','+(VB_H-PADB)+' Z"/><polyline class="line" points="'+pts.join(' ')+'"/>'; } }
  off.forEach(s=>{ svgs+='<circle class="dot off" cx="'+X(s.date)+'" cy="'+Y(s.kg)+'" r="5"/>'; });
  real.forEach(s=>{ svgs+='<circle class="dot'+(best&&s.date===best.date?' best':'')+'" cx="'+X(s.date)+'" cy="'+Y(s.kg)+'" r="5"/>'; });
  svgs+='<text class="xlab" x="'+PADL+'" y="'+(VB_H-6)+'" text-anchor="start">'+fmtDate(list[0].date)+'</text><text class="xlab" x="'+(VB_W-PADR)+'" y="'+(VB_H-6)+'" text-anchor="end">today</text></svg>';
  plot.innerHTML=svgs;
  if(real.length>=2){ const d=r1(real[real.length-1].kg-real[0].kg); cap.innerHTML=(d>=0?'+':'')+d+' '+STATE.unit+' <span class="mu">· '+(active==='ALL'?'all time':'in '+active)+'</span>'; }
  else cap.textContent= real.length?'one session here':'';
}
function drawStats(e){
  const real=e.hist.filter(s=>!s.off);
  const best=real.length?Math.max(...real.map(s=>s.kg)):0;
  const w30=real.filter(s=>daysAgo(s.date)<=30); const d30=w30.length>=2?r1(w30[w30.length-1].kg-w30[0].kg):0;
  $('#hstats').innerHTML='<div class="stat"><div class="k">Sessions</div><div class="v">'+real.length+'</div></div><div class="stat"><div class="k">Last 30 days</div><div class="v up">'+(d30>=0?'+':'')+d30+' '+STATE.unit+'</div></div><div class="stat"><div class="k">Best</div><div class="v gold">'+best+' '+STATE.unit+'</div></div>';
}
function drawTable(e, all){
  const body=$('#hbody');
  if(!all.length){ body.innerHTML='<tr><td colspan="5"><div class="emptyHist">No sessions yet. Log a set and it lands here.</div></td></tr>'; return; }
  const real=all.filter(s=>!s.off);
  const best= real.length? real.reduce((b,s)=>(s.kg>b.kg||(s.kg===b.kg&&topReps(s)>topReps(b)))?s:b):null;
  body.innerHTML=all.slice().reverse().slice(0,10).map(s=>{
    const prevReal=real.filter(x=>x.date<s.date); const prev=prevReal.length?prevReal[prevReal.length-1]:null;
    const d=prev?r1(s.kg-prev.kg):null; const isBest=best&&s.date===best.date && !s.off;
    const prog = s.off? '<td class="prog first">rest</td>' : (d==null?'<td class="prog first">first</td>':'<td class="prog">'+(d>=0?'+':'')+d+'</td>');
    const w = isBest? '<td><span class="best-w">'+svg('<path d="M12 3.5l2.5 5.1 5.6.8-4 3.9 1 5.6L12 16.9 6.9 18.9l1-5.6-4-3.9 5.6-.8z"/>')+'<span class="num">'+s.kg+'</span> <span class="u">'+STATE.unit+'</span></span></td>' : '<td><span class="num">'+s.kg+'</span> <span class="u">'+STATE.unit+'</span></td>';
    return '<tr><td>'+fmtDate(s.date)+'</td><td>'+setCount(s)+'</td><td>'+topReps(s)+'</td>'+w+prog+'</tr>';
  }).join('');
}

             : '<p class="formGist" style="font-size:15px;font-weight:500;color:var(--muted-strong)">Swap this lift for today. The new exercise starts fresh on this day.</p>')
    + customBlock

          day.ex.push(def);

}

/* ---- tune popup --------------------------------------------------- */
function openTune(e){
  const draft={ kg:e.kg, reps:e.reps, sets:e.sets, rest:e.rest };
  const loggedCount=e.log.filter(s=>s).length;
  openPop(popHead('Tune · '+(curDay().type||'session')+' day', e.name)
    + '<div style="margin-top:18px"></div>'
    + fieldRow('Weight','<input class="wInput" id="tw" type="number" inputmode="decimal" step="0.5" value="'+draft.kg+'"><span class="wUnit">'+STATE.unit+(e.perHand?'/ea':'')+'</span>', 'weight')
    + stepRow('Sets','tsets', draft.sets)
    + stepRow('Reps','treps', draft.reps)
    + stepRow('Rest','trest', mmss(draft.rest))
    + '<div class="popBtns"><button class="pbtn ghost" id="tcancel">cancel</button><button class="pbtn save" id="tsave">save</button></div>',
    scrim=>{
      const sync=()=>{ scrim.querySelector('#tsets .stepVal').textContent=draft.sets; scrim.querySelector('#treps .stepVal').textContent=draft.reps; scrim.querySelector('#trest .stepVal').textContent=mmss(draft.rest); };
      scrim.querySelector('#tw').oninput=ev=>{ const v=parseFloat(ev.target.value); if(Number.isFinite(v)) draft.kg=v; };
      scrim.querySelectorAll('.step').forEach(b=> b.onclick=()=>{ const f=b.dataset.f, d=+b.dataset.d;
        if(f==='rest'){ draft.rest=Math.max(0,draft.rest+d*15); }
        else if(f==='sets'){ draft.sets=Math.min(8,Math.max(Math.max(1,loggedCount),draft.sets+d)); }
        else if(f==='reps'){ draft.reps=Math.min(50,Math.max(1,draft.reps+d)); }
        sync(); });
      scrim.querySelector('#tcancel').onclick=closePop;
      scrim.querySelector('#tsave').onclick=()=>{ e.kg=Number.isFinite(draft.kg)?draft.kg:e.kg; e.reps=draft.reps; e.rest=draft.rest;
        // grow / shrink the set list, keeping logged sets
        if(draft.sets>e.log.length){ while(e.log.length<draft.sets) e.log.push(null); }
        else if(draft.sets<e.log.length){ e.log=e.log.slice(0,Math.max(loggedCount,draft.sets)); }
        e.sets=e.log.length; closePop(); render(); };
    });
}
function fieldRow(label, ctl, icon){ const ic={weight:'<path d="M7 9v6M17 9v6M4 12h3M17 12h3M9 9h6v6H9z"/>'}[icon]||''; return '<div class="field"><span class="lbl">'+svg(ic,' fill="none" stroke="currentColor"')+label+'</span><div class="stepper">'+ctl+'</div></div>'; }
function stepRow(label, id, val){ const f=id==='tsets'?'sets':(id==='treps'?'reps':'rest'); return '<div class="field" id="'+id+'"><span class="lbl">'+label+'</span><div class="stepper"><button class="step minus" data-f="'+f+'" data-d="-1">−</button><span class="stepVal">'+val+'</span><button class="step" data-f="'+f+'" data-d="1">+</button></div></div>'; }

/* ---- overflow menu (remove / deload / note) ---------------------- */
function openMenu(e, day, btn){
  const root=$('#popRoot');
  const r=btn.getBoundingClientRect();
  root.innerHTML='<div class="scrim" id="scrim" style="background:transparent"><div class="menuPop" id="menuPop"></div></div>';
  const scrim=$('#scrim'); const menu=$('#menuPop');
  menu.innerHTML=
    '<button data-m="deload">'+svg('<path d="M12 5v9M8 11l4 4 4-4M5 19h14"/>',' fill="none" stroke="currentColor"')+(e.deload?'Remove deload':'Deload this lift')+'</button>'
    + '<button data-m="note">'+svg('<path d="M4 5h16M4 12h16M4 19h10"/>',' fill="none" stroke="currentColor"')+(e.note?'Edit note':'Add a note')+'</button>'
    + '<div class="sep"></div>'
    + '<button class="danger" data-m="remove">'+svg('<path d="M5 7h14M10 11v6M14 11v6M6 7l1 12h10l1-12M9 7V4h6v3"/>',' fill="none" stroke="currentColor"')+'Remove from day</button>';
  // position near the button, clamped to viewport
  const mw=190; let left=Math.min(r.right-mw, window.innerWidth-mw-10); left=Math.max(10,left); let top=r.bottom+6;
  menu.style.left=left+'px'; menu.style.top=top+'px';
  escHandler=ev=>{ if(ev.key==='Escape') closePop(); }; document.addEventListener('keydown',escHandler);
  scrim.addEventListener('click',ev=>{ if(ev.target===scrim) closePop(); });
  menu.querySelectorAll('button').forEach(b=> b.onclick=()=>{
    const m=b.dataset.m; closePop();
    if(m==='deload'){ e.deload=!e.deload; render(); }
    else if(m==='note'){ openNote(e); }
    else if(m==='remove'){ confirmRemove(e, day); }
  });
}
function openNote(e){
  // inline note editor under the card
  render();
  const card=document.querySelector('.ex[data-id="'+e.id+'"]'); if(!card) return;
  const meta=card.querySelector('.exMeta');
  const ed=document.createElement('div'); ed.className='noteEdit';
  ed.innerHTML='<input id="noteIn" placeholder="A note for this lift" value="'+escapeHtml(e.note||'')+'"><button id="noteSave">save</button>';
  meta.insertAdjacentElement('afterend', ed);
  const inp=ed.querySelector('#noteIn'); inp.focus();
  const save=()=>{ e.note=inp.value.trim(); render(); };
  ed.querySelector('#noteSave').onclick=save;
  inp.addEventListener('keydown',ev=>{ if(ev.key==='Enter') save(); if(ev.key==='Escape'){ render(); } });
}
function confirmRemove(e, day){
  openPop(popHead('Remove', e.name)
    + '<p class="formGist" style="font-size:15px;font-weight:500;color:var(--muted-strong)">Your logged history is kept. This only removes '+e.name+' from your '+day.name+' day.</p>'
    + '<div class="popBtns"><button class="pbtn ghost" id="rcancel">Keep it</button><button class="pbtn danger" id="ryes">Remove</button></div>',
    scrim=>{ scrim.querySelector('#rcancel').onclick=closePop; scrim.querySelector('#ryes').onclick=()=>{ const i=day.ex.findIndex(x=>x.id===e.id); if(i>=0) day.ex.splice(i,1); stopRest(e.id); closePop(); render(); }; });
}

/* ---- celebrate ---------------------------------------------------- */
function celebrate(e, kg, reps){
  const heavier=r1(kg+2.5);
  $('#ch2').innerHTML='You beat your best on '+e.name+'. Next time, chase <span class="goal">'+heavier+' '+STATE.unit+'</span> or <span class="goal">'+kg+' '+STATE.unit+' × '+(reps+1)+'</span>.';
  const c=$('#celebrate'); c.classList.add('on'); c.onclick=()=>c.classList.remove('on');
}

/* ---- start fresh -------------------------------------------------- */
function wireFresh(){
  const fb=$('#freshbtn'); let armed=false, timer=null;
  fb.onclick=()=>{
    if(!armed){ armed=true; fb.textContent='Tap again to wipe this device'; fb.classList.add('arm'); timer=setTimeout(()=>{ armed=false; fb.textContent='Start fresh'; fb.classList.remove('arm'); },3000); return; }
    clearTimeout(timer); armed=false; fb.textContent='Start fresh'; fb.classList.remove('arm');
    Object.keys(restTimers).forEach(stopRest);
    STATE=buildState(); STATE.submitted=false; render();
  };
}

/* ---- inlined backdrop particles (self-contained) ------------------ */
function spawnParticles(root){
  if(!root) return;
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const N = window.innerWidth<640?10:18;
  for(let i=0;i<N;i++){ const s=document.createElement('span'); const dur=18+Math.random()*22, size=1+Math.random()*1.2;
    s.style.left=(Math.random()*100)+'%'; s.style.top=(60+Math.random()*40)+'vh'; s.style.width=s.style.height=size+'px';
    s.style.animationDuration=dur+'s'; s.style.animationDelay=(-Math.random()*dur)+'s';
    s.style.setProperty('--dx',(Math.random()*30-15)+'px'); s.style.setProperty('--dy',(-(60+Math.random()*50))+'vh'); root.appendChild(s); }
}

/* ---- boot: load state from the dashboard bridge, THEN render -------
   window.Vitality is injected by the dashboard — we never define it. load()
   returns [] when empty, or the saved STATE object; render only after it resolves. */
(async()=>{
  let d=null;
  try{ d = await window.Vitality.load(); }catch(e){ d=null; }
  STATE = (d && typeof d==='object' && !Array.isArray(d) && d.days) ? d : buildState();
  // Back-compat: saved state from before tabs were customizable has no
  // .order — derive one from whatever days exist. Also drop any stale
  // order entries left over from a delete that didn't fully persist.
  if(!STATE.order || !Array.isArray(STATE.order)) STATE.order = Object.keys(STATE.days);
  STATE.order = STATE.order.filter(k=>STATE.days[k]);
  if(!STATE.order.length) STATE.order = Object.keys(STATE.days);
  if(!STATE.days[STATE.active]) STATE.active = STATE.order[0];
  render(); wireFresh();
  spawnParticles(document.querySelector('#vt-backdrop .wb-particles'));
})();
</script>
